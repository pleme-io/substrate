# Go Software Delivery Standard (GSDS) — Machine-readable rules registry.
#
# One entry per rule. Fields:
#   id          canonical, normalized rule ID (stable; cross-references resolve to these)
#   dimension   navigation dimension the rule belongs to
#   enforcement one-line summary of how the rule is enforced
#
# IDs are normalized to a single per-dimension prefix:
#   LAYOUT-*  repo-layout-and-module      NAME-*  naming
#   CLI-*     cli-ux                      CFG-*   configuration
#   OBS-*     observability               ERR-*   errors
#   LIFE-*    lifecycle-and-health        NET-*   networking
#   JOB-*     concurrency-and-jobs        DOC-*   documentation-and-discoverability
#   VER-*     versioning-and-compatibility
#   TEST-*    testing-and-quality         SEC-*   security-and-supply-chain
#   UI-*      uiux-look-and-feel
#
# FSM rules (the delivery type system) are NOT listed here; they live in
# go-software-delivery-standard.md under "Delivery FSM Type System".

rules:
  # --- repo-layout-and-module ---------------------------------------------
  - id: LAYOUT-01
    dimension: repo-layout-and-module
    enforcement: "caixa-validate asserts go.mod line 1 == module github.com/pleme-io/<basename> (-go suffix preserved); go vet + mkGoLibraryCheck; GitHub-posture IaC owns the slug."
  - id: LAYOUT-02
    dimension: repo-layout-and-module
    enforcement: "Eval-time throw in lib/build/go/tool.nix goVersionAssert: go.mod minor compared via builtins.compareVersions to pkgs.go.version; aborts Nix eval before build."
  - id: LAYOUT-03
    dimension: repo-layout-and-module
    enforcement: "caixa-validate lint rejects non-main under cmd/, func main() outside cmd/, and empty/import-less pkg/; go build enforces internal/ boundary; mkGoLibraryCheck builds ./..."
  - id: LAYOUT-04
    dimension: repo-layout-and-module
    enforcement: "caixa-validate asserts the six required top-level files exist non-empty; diffs LICENSE vs MIT template; asserts README H1 == slug and CHANGELOG [Unreleased]."
  - id: LAYOUT-05
    dimension: repo-layout-and-module
    enforcement: "caixa-validate rejects .goreleaser.yml/.yaml; release performed exclusively by substrate apps.release (mkReleaseApp language=go) which tags+pushes only."
  - id: LAYOUT-06
    dimension: repo-layout-and-module
    enforcement: "nix flake check builds packages.default; flake-hygiene.nix enforceAll; caixa-validate lints for a build/go/* helper import and no raw buildGoModule; repo-forge flags hand-rolled flakes."
  - id: LAYOUT-07
    dimension: repo-layout-and-module
    enforcement: "caixa-validate rejects any workflow not matching the substrate-emitted auto-release.yml shape and run: blocks over the glue budget; workflow regenerated by pleme-doc-gen caixa."
  - id: LAYOUT-08
    dimension: repo-layout-and-module
    enforcement: "caixa-validate cross-checks cmd/ count vs caixa.lisp :kind and the flake helper used; substrate monorepo.nix assertions; nix flake check builds every declared cmd/."
  - id: LAYOUT-09
    dimension: repo-layout-and-module
    enforcement: "caixa-validate parses caixa.lisp and asserts :kind in the five kinds and :ecosystem in the Go ecosystems, cross-checking on-disk layout; defcaixa is a compile-time tatara-lisp macro."
  - id: LAYOUT-10
    dimension: repo-layout-and-module
    enforcement: "caixa-validate lints go.mod require blocks for local re-implementations of mandated-lib concerns; mkGoLibraryCheck/mkGoTool build against committed go.sum; go mod verify in check-all."
  - id: LAYOUT-11
    dimension: repo-layout-and-module
    enforcement: "caixa-validate computes the canonical name from the basename and asserts byte-equality across go.mod suffix, caixa.lisp name/:package.name, README H1, flake name/toolName, and cmd/<name>/."
  - id: LAYOUT-12
    dimension: repo-layout-and-module
    enforcement: "caixa-validate rejects a committed vendor/; mkGoTool requires an explicit vendorHash; mkGoLibraryCheck builds the proxy-resolved closure; go mod verify in check-all."

  # --- naming --------------------------------------------------------------
  - id: NAME-01
    dimension: naming
    enforcement: "caixa-validate asserts module path == github.com/pleme-io/$(basename); library-flake.nix repo/name args cross-checked at Nix eval; tend status flags on-disk/slug divergence."
  - id: NAME-02
    dimension: naming
    enforcement: "go vet + revive/golangci-lint package-comments/var-naming forbid mixedCaps/underscore package names; caixa-validate computes the strip-and-collapse transform; multi-word collapses declared in caixa.lisp."
  - id: NAME-03
    dimension: naming
    enforcement: "golangci-lint revive exported (stutter) + staticcheck ST1003; With<Field> options type-checked as the package Option func type by the compiler."
  - id: NAME-04
    dimension: naming
    enforcement: "caixa-validate asserts <package>.go or doc.go at root carries the // Package <name> comment; gofmt -l; filename lint forbids uppercase/double-underscore; coverage-presence check for *_test.go peers."
  - id: NAME-05
    dimension: naming
    enforcement: "mkGoTool asserts nonEmptyStr pname and pins bin/${toolName} with meta.mainProgram=pname; caixa-validate asserts cli.NewApp(name) == toolName == module tail; nix build + run smoke-test."
  - id: NAME-06
    dimension: naming
    enforcement: "caixa-validate AST-scans cli.Command{Name:…} literals rejecting non-kebab/uppercase/space/reserved-collision names; cli-go router shadowing rules caught in the integration smoke test."
  - id: NAME-07
    dimension: naming
    enforcement: "caixa-validate asserts the shikumi.Load prefix arg == ToUpper(ReplaceAll(binary,'-','_'))+'_'; lint forbids raw os.Getenv on uppercase identifiers outside the cloud-SDK allowlist."
  - id: NAME-08
    dimension: naming
    enforcement: "caixa-validate asserts shikumi.New(...) == binary name and .EnvOverride(...) == <PREFIX>CONFIG; integration smoke test sets <PREFIX>CONFIG and asserts load."
  - id: NAME-09
    dimension: naming
    enforcement: "caixa-validate parses config-struct tags asserting snake_case matching the YAML schema; round-trip test loads YAML and equivalent PREFIX_* env asserting identical structs; golangci-lint tagliatelle."
  - id: NAME-10
    dimension: naming
    enforcement: "go build + go vet enforce internal/ import boundary (compiler); staticcheck ST1000/revive flag dir-vs-package mismatch; caixa-validate asserts Base(dir)==packageClause for every non-root, non-main package."
  - id: NAME-11
    dimension: naming
    enforcement: "caixa-validate asserts every package main file is at cmd/<x>/main.go and the cmd/* dir set equals the declared binary set; monorepo-binary.nix fails if a requested cmd/<binary> path is absent."
  - id: NAME-12
    dimension: naming
    enforcement: "caixa-validate asserts action repos end in -action, build via action-release-flake.nix, and every action.yml input key is kebab-case; round-trip test sets INPUT_<NAME> and asserts ParseInputs."
  - id: NAME-13
    dimension: naming
    enforcement: "golangci-lint revive var-naming + staticcheck ST1003 enforce initialism caps in identifiers; the NAME-04/06/09/07 lints forbid uppercase in file/command/key/env surfaces (pincer)."

  # --- cli-ux --------------------------------------------------------------
  - id: CLI-01
    dimension: cli-ux
    enforcement: "go vet + forbidigo ban flag.Parse/NewFlagSet/CommandLine and cobra/pflag/urfave/kingpin imports outside _test.go; grep gate requires cli-go import; dispatch forced to cli.App.Run(ctx, []string)."
  - id: CLI-02
    dimension: cli-ux
    enforcement: "cli-go-conformance harness walks app.Commands asserting Name regex, non-empty Summary, no leaf+group hybrid (untagged), and Sub depth <= 1."
  - id: CLI-03
    dimension: cli-ux
    enforcement: "Conformance harness invokes [<path>, --help] over the tree asserting cli.ErrHelp and a non-empty usage block naming every registered flag; forbidigo bans flags on flag.CommandLine; CI matrix greps Usage:."
  - id: CLI-04
    dimension: cli-ux
    enforcement: "substrate Go builder injects -ldflags -X main.version; library-check.nix fails if main.version unset; harness asserts version/--version emit `name <nonEmpty>` and no -v means verbose."
  - id: CLI-05
    dimension: cli-ux
    enforcement: "cli.Globals registrar; harness asserts every Command.Flags calls it with canonical defaults and no command collides with the reserved global namespace; golangci analyzer flags non-Globals --output."
  - id: CLI-06
    dimension: cli-ux
    enforcement: "cli.Resolve[T](fs, store) overlays only fs.Visit-detected flags atop shikumi; table-driven conformance test asserts all four precedence permutations (incl. default flag does NOT beat file)."
  - id: CLI-07
    dimension: cli-ux
    enforcement: "cli.Render is the only data emitter; forbidigo bans fmt.Print* and json.NewEncoder(os.Stdout) in Run bodies; harness asserts -o json/-o yaml round-trip cleanly; cli.OneOf validates --output."
  - id: CLI-08
    dimension: cli-ux
    enforcement: "forbidigo bans fmt.Print*/print/println/log.* across cmd/ and command packages; logging-go set WithWriter(os.Stderr) for CLI; conformance test asserts -o json stdout is ONLY the JSON document."
  - id: CLI-09
    dimension: cli-ux
    enforcement: "cli.ExitCode/cli.Exit is the only exit path; golangci bans os.Exit literals outside cli.Exit and bans log.Fatal*; table-driven test maps every sentinel/severity to its code."
  - id: CLI-10
    dimension: cli-ux
    enforcement: "Harness asserts constrained-flag rejection before Run runs (instrumented); golangci flags manual shape-checks duplicating a validator; cli.Render error path serializes CodeOf into the json envelope."
  - id: CLI-11
    dimension: cli-ux
    enforcement: "cli.Completion(app) generator + app.AddCompletion(); harness asserts bash/zsh/fish scripts are non-empty and reference every top-level command; library-check asserts completions.install=true matching the binary."
  - id: CLI-12
    dimension: cli-ux
    enforcement: "substrate mkGoCliTool emits the canonical main shim; golangci bans os.Exit/log.Fatal* and direct signal.Notify outside it; conformance test asserts a cancel maps to 130 and lifecycle-go closers ran."

  # --- configuration -------------------------------------------------------
  - id: CFG-01
    dimension: configuration
    enforcement: "go vet-style analyzer flags os.Getenv/os.LookupEnv outside shikumi-go and outside a registered Resolve closure; grep-gate forbids map[string]any/interface{} in *config*.go; shikumi.Load[T] is generic over the struct."
  - id: CFG-02
    dimension: configuration
    enforcement: "Grep-gate forbids direct gopkg.in/yaml, koanf, BurntSushi/toml, spf13/viper imports in non-test files; loader entry points are generic functions in shikumi-go (auditable via find_references)."
  - id: CFG-03
    dimension: configuration
    enforcement: "shikumi-go Discovery.candidates() is the only path-construction code (precedence by construction); analyzer asserts EnvOverride matches ^[A-Z0-9]+_CONFIG$; --print-config-path smoke test."
  - id: CFG-04
    dimension: configuration
    enforcement: "Layer order enforced by construction in shikumi-go Load[T]; analyzer asserts the prefix matches ^[A-Z0-9]+_$ == {APP}_; no-os.Setenv/no-init-mutation grep-gate for defaults-as-globals."
  - id: CFG-05
    dimension: configuration
    enforcement: "Analyzer rejects json:/toml:/mapstructure: tags and untagged multi-word fields on any Load/LoadStore type; shikumi-go hard-codes TagName/Tag=structTag so other tag families are ignored at runtime."
  - id: CFG-06
    dimension: configuration
    enforcement: "Grep-gate forbids mapstructure.DecoderConfig, koanf.New, koanf.UnmarshalConf outside shikumi-go; new format/coercion needs gated to a shikumi-go PR; find_references shows shikumi-go as sole decoder owner."
  - id: CFG-07
    dimension: configuration
    enforcement: "Analyzer flags secret-named fields typed as bare string (must be SecretRef); SecretRef has no exported plaintext accessor; cofre verify asserts every SecretRef resolves in its backend."
  - id: CFG-08
    dimension: configuration
    enforcement: "Analyzer flags logging/printf of a Config/SecretRef/AuthResult that does not implement slog.LogValuer with redaction; unit test asserts the rendered line has no secret bytes; logging-go is the only sanctioned logger."
  - id: CFG-09
    dimension: configuration
    enforcement: "Resolved-secret type is returned only from AuthResolver.Resolve / cofre and is not assignable into a config field; analyzer flags assignment into a package var or back into config; find_references confirms request-scope call sites."
  - id: CFG-10
    dimension: configuration
    enforcement: "Analyzer requires a Validate() error on every Load/LoadStore type returning errors-go WithCode errors; unit test drives one invalid fixture per invariant; reload path runs a bad-reload-rejected test."
  - id: CFG-11
    dimension: configuration
    enforcement: "Analyzer flags one-shot Load in a service main importing lifecycle-go, a captured store.Get() in a field/global, and a Watch without a paired defer Close(); Watch callback must invoke Validate."
  - id: CFG-12
    dimension: configuration
    enforcement: "Analyzer requires a // reload: hot|warm|cold marker on every field and its rendering in the schema doc; the onReload callback must compare COLD fields; CI test changes a COLD field and asserts the warning + unchanged behavior."
  - id: CFG-13
    dimension: configuration
    enforcement: "gen-config-docs (todoku-go/pleme-actions-shared-go) reflects the Config struct and emits docs/config.md + config.schema.json + config.example.yaml; CI re-runs and fails on any diff; --print-schema subcommand."
  - id: CFG-14
    dimension: configuration
    enforcement: "pleme-actions-shared-go bootstrap.Config[T] performs steps 1-5 in order; analyzer flags a main calling LoadStore without the helper or logging.New before Validate; lifecycle-go hook registry type-checks Close(); startup test fails fast on invalid config."

  # --- observability -------------------------------------------------------
  - id: OBS-01
    dimension: observability
    enforcement: "forbidigo + depguard ban zap/logrus/zerolog and slog.New/NewJSONHandler/NewTextHandler/SetDefault/log.New/log.Print* outside logging-go; substrate library-check/service-flake run the linter as a derivation check."
  - id: OBS-02
    dimension: observability
    enforcement: "logging.WithFormat defaults to JSON and New defaults writer=os.Stdout (safe == zero-config); lint asserts no WithWriter outside _test.go and WithFormat is \"json\" or a JSON-defaulting var; distroless build asserts no log-file mount."
  - id: OBS-03
    dimension: observability
    enforcement: "logging.ParseLevel rejects out-of-vocabulary names and WithLevelFromEnv falls back to info; lint flags WithLevel in non-test files and out-of-vocabulary level literals; config schema types the level as a four-name enum."
  - id: OBS-04
    dimension: observability
    enforcement: "Mandated middleware library (net/http + gRPC interceptors) performs adopt-or-mint + WithCorrelationID; CI checks the server constructor wires it; vet pass flags forbidden synonyms and requires CorrelationIDKey."
  - id: OBS-05
    dimension: observability
    enforcement: "logging.WithTenant ignores empty tenant and contextAttrs omits an absent tenant (no placeholder by construction); vet pass flags tenant synonyms, literal default/empty, and reading tenant from request bodies."
  - id: OBS-06
    dimension: observability
    enforcement: "go/analysis vet pass errors on a non-Context level method where a context.Context is in scope, and flags InfoContext(context.Background(), ...) when a named ctx exists; build-failing in the substrate go check."
  - id: OBS-07
    dimension: observability
    enforcement: "vet pass flags a non-constant msg, fmt.Sprintf/concat reaching msg, and non-snake_case attribute keys; golangci-lint sloglint (key-naming=snake, no-mixed-args, static-msg)."
  - id: OBS-08
    dimension: observability
    enforcement: "logging.LogError reads SeverityOf and dispatches the matching level; vet pass flags ErrorContext carrying a Notice/Warning error and ErrorContext on a non-failure return."
  - id: OBS-09
    dimension: observability
    enforcement: "logging.LogError emits err/code/severity in one shape; vet pass flags log-and-return (same error logged and returned in a block); sloglint enforces the err key; errors-go wrapping lint."
  - id: OBS-10
    dimension: observability
    enforcement: "forbidigo bans panic(/os.Exit(/log.Fatal/log.Panic in non-main non-test files (allowlist tagged //nolint:forbidigo // invariant); lifecycle.Go recover-wrapped launcher; vet flags raw go func() in library code."
  - id: OBS-11
    dimension: observability
    enforcement: "forbidigo bans log.Fatal*/os.Exit except one allowlisted os.Exit at the end of main; lifecycle.NewShutdown requires a *slog.Logger (un-logged shutdown won't compile); CI asserts lifecycle.SignalContext is the root context."
  - id: OBS-12
    dimension: observability
    enforcement: "vet pass flags raw ticker/time.Tick loops requiring lifecycle.RunLoop and flags RunLoop without WithLoopLogger (which would default to DiscardHandler); build-failing in the substrate go check."
  - id: OBS-13
    dimension: observability
    enforcement: "substrate service-flake/grpc-service archetype requires mounting lifecycle.Registry.Handler() and a /metrics handler (required typed health/metrics blocks); caixa-helm declares scrape annotations; libraries/CLIs exempt via library-flake/tool.nix."
  - id: OBS-14
    dimension: observability
    enforcement: "Where the OTel SDK is imported, vet pass requires tracer init at the logging.New site, a lifecycle.Shutdown 'tracing' hook calling Shutdown, and span-scoped trace_id on records; logging+otel bridge helper satisfies the check."

  # --- errors --------------------------------------------------------------
  - id: ERR-01
    dimension: errors
    enforcement: "gsds-errors-lint forbids fmt.Errorf with %w or returned-as-error, forbids stdlib errors.New in non-test files, and requires errors-go in go.mod for any module returning error; wired as a check derivation."
  - id: ERR-02
    dimension: errors
    enforcement: "gsds-errors-lint AST pass: package-level errs.New vars must be Err-prefixed with a WithCode matching ^E_[A-Z0-9_]+$; gsds-error-codes.yaml manifest validated; removing/renaming a published code fails CI."
  - id: ERR-03
    dimension: errors
    enforcement: "gsds-errors-lint flags errs.Wrap messages containing ': ', trailing punctuation, '%', or concatenated err.Error() (error severity), and exported pass-throughs lacking a wrap (warning)."
  - id: ERR-04
    dimension: errors
    enforcement: "gsds-errors-lint flags an errs.Wrap WithSeverity that lowers a statically-known cause severity (error) and requires a //gsds:reclassify comment on any severity-bearing wrap; property test asserts no-option wrap preserves severity."
  - id: ERR-05
    dimension: errors
    enforcement: "gsds-errors-lint (strict Biblioteca profile via caixa.lisp) forbids os.Exit/log.Fatal*/log.Panic*/Fprint*(os.Stderr) and panic( without a //gsds:invariant comment; build fails via library-check.nix."
  - id: ERR-06
    dimension: errors
    enforcement: "gsds-errors-lint strict-binary profile: at most one os.Exit (in func main), requires a run(...) error indirection and a call to errs.ExitCode; caixa-validate blocks Binario -> publishable until the funnel is detected."
  - id: ERR-07
    dimension: errors
    enforcement: "errors-go ExitCode has an exhaustive Severity switch (exhaustive-linted); gsds-errors-lint forbids os.Exit(<int>) other than via errs.ExitCode/os.Exit(0); golden table test; gsds-exit-codes.yaml schema-validated."
  - id: ERR-08
    dimension: errors
    enforcement: "errcheck (-blank -asserts) fails on unchecked errors; custom pass requires //gsds:ignore on any _ = <err>; empty if err != nil {} flagged; deferred fallible calls must aggregate; wired as a failing check derivation."
  - id: ERR-09
    dimension: errors
    enforcement: "gsds-errors-lint forbids err.Error()==, strings.Contains(err.Error(),...), and == against non-Err-prefixed values; any local type with an error field must implement Unwrap() error / []error."
  - id: ERR-10
    dimension: errors
    enforcement: "gsds-errors-lint warns on a range loop with first-error-return and no aggregation and no inter-iteration dependency; property test asserts SeverityOf(Join(a,b))==max; any hand-rolled []error join other than errs.Join is forbidden."
  - id: ERR-11
    dimension: errors
    enforcement: "gsds-errors-lint flags a function that both logs and returns the same error; forbids fmt.Print*/log.Print* carrying an error outside main; logging.LevelForSeverity is exhaustive-linted with a golden three-rung test."
  - id: ERR-12
    dimension: errors
    enforcement: "gsds-errors-lint requires the first wrap of a recognized foreign error in a handler to carry WithCode (warning) and forbids returning an internal chain's err.Error() in an HTTP/gRPC body (taint analysis, error severity); cli.ErrHelp/ErrNoCommand map to exit 0."

  # --- lifecycle-and-health ------------------------------------------------
  - id: LIFE-01
    dimension: lifecycle-and-health
    enforcement: "forbidigo bans os/signal.Notify/NotifyContext/Ignore in cmd/** and daemon packages; caixa-validate AST gate asserts exactly one lifecycle.SignalContext per service main with a deferred CancelFunc."
  - id: LIFE-02
    dimension: lifecycle-and-health
    enforcement: "caixa-validate requires a lifecycle.Shutdown construction, sd.Run reached only after <-ctx.Done() (control-flow), and flags defer Close()/Shutdown() on process-lifetime resources; forbidigo bans os.Exit referencing the shutdown var."
  - id: LIFE-03
    dimension: lifecycle-and-health
    enforcement: "caixa-validate ordering gate asserts the inbound-listener hook is the last sd.Add and no Add follows the first listener Serve goroutine for a different resource; warns on acquire-without-teardown."
  - id: LIFE-04
    dimension: lifecycle-and-health
    enforcement: "shikumi-go types lifecycle.shutdown_timeout as a positive Duration with a default; caixa-validate asserts sd.Run uses context.Background() and a non-zero duration; service-module.nix cross-checks grace > timeout at nix flake check."
  - id: LIFE-05
    dimension: lifecycle-and-health
    enforcement: "caixa-validate requires a lifecycle.Registry bound to reg.Handler(); forbidigo bans HandleFunc/Handle paths matching ^/(health|healthz|readyz|ready|ping|livez)$ outside lifecycle-go; nix flake check asserts Go health port == rendered probe port."
  - id: LIFE-06
    dimension: lifecycle-and-health
    enforcement: "caixa-validate builds the probe graph; any RegisterLiveness whose body transitively calls a known I/O symbol (PingContext/http.Do/net.Dial) is a hard error; dependency checks permitted only under RegisterReadiness."
  - id: LIFE-07
    dimension: lifecycle-and-health
    enforcement: "caixa-validate requires every probe body to reference its ctx and return errors-go errors; golangci flags errors.New/fmt.Errorf inside probe bodies; perf lint warns on >1 I/O call without a cache read."
  - id: LIFE-08
    dimension: lifecycle-and-health
    enforcement: "forbidigo bans time.Tick and time.NewTicker/time.Sleep in loop bodies in cmd/**/daemon packages; caixa-validate flags ctx-done+timer for-select as a reimplemented RunLoop; tick signature checked == lifecycle.TickFunc."
  - id: LIFE-09
    dimension: lifecycle-and-health
    enforcement: "caixa-validate requires each RunLoop to pass WithBackoff/WithStopOnError or a // non-fatal annotation; a WithStopOnError loop must not be go-spawned-and-discarded; WithBackoff max must be a typed duration."
  - id: LIFE-10
    dimension: lifecycle-and-health
    enforcement: "caixa-validate requires shigoto-go consumers to call dag.Validate() fatally at startup and call sched.Tick only inside a lifecycle.RunLoop TickFunc; golangci bans bare for { sched.Tick(...) }; lifecycle-go pairing asserted at the dependency level."
  - id: LIFE-11
    dimension: lifecycle-and-health
    enforcement: "caixa-validate forbids discarding the TickReceipt while readiness probes exist and requires referencing receipt.Unhealed; the DAG error must propagate; work-graph caixas require a readiness probe reflecting Unhealed; emitted-log severity checked per phase."
  - id: LIFE-12
    dimension: lifecycle-and-health
    enforcement: "caixa-validate startup-order gate asserts config -> logger -> SignalContext -> Shutdown -> deps -> health-server -> traffic+loops -> ctx.Done -> Run and flags a traffic Serve preceding a dependency or the health server; errcheck on dependency constructors; service-typed.nix asserts the daemon entrypoint shape."
  - id: LIFE-13
    dimension: lifecycle-and-health
    enforcement: "nix flake check asserts the rendered ExecStart subcommand equals a registered cli.Command.Name (substrate daemon.subcommand vs the Go AST app.Add set); caixa-validate requires the lifecycle primitives inside a subcommand Run; mismatch fails the build."
  - id: LIFE-14
    dimension: lifecycle-and-health
    enforcement: "forbidigo bans (*http.Server).Close in daemon/service packages outside tests; caixa-validate asserts the http/grpc hook uses the hook's context, not a fresh Background(); a shared graceful-with-fallback gRPC helper standardises the shape."

  # --- networking ----------------------------------------------------------
  - id: NET-01
    dimension: networking
    enforcement: "gsds-net-outbound: vet-style analyzer + ripgrep rule fail the build if net/http Get/Post/Head/PostForm/DefaultClient/DefaultTransport or a non-todoku HTTP-client import appears in non-test code; allowlist == todoku-go + net/http types into WithHTTPClient; wired in service-flake.nix/tool-release-flake.nix."
  - id: NET-02
    dimension: networking
    enforcement: "gsds-net-retry flags time.Sleep in network/IO loops, known backoff-lib imports, and `for .*attempt`+sleep; allowed sleeps need //nolint:gsds-net-retry; retry config only via DefaultRetry/NoRetry/AggressiveRetry or an explicit RetryConfig into WithRetry."
  - id: NET-03
    dimension: networking
    enforcement: "gsds-net-retry flags a RetryConfig whose RetryStatuses contains a non-429 4xx and any POST/PUT/PATCH client with a non-NoRetry policy lacking an idempotency key; reviewers gate the justification comment for custom literals."
  - id: NET-04
    dimension: networking
    enforcement: "gsds-net-ctx flags context.Background()/TODO() outside cmd/ and main and any IO function lacking a context.Context first param; go vet lostcancel and the contextcheck linter enabled in the substrate Go check set."
  - id: NET-05
    dimension: networking
    enforcement: "gsds-net-timeout flags todoku.New without WithTimeout/WithHTTPClient and a hardcoded duration literal to WithTimeout; the canonical client factory errors if the resolved timeout <= 0; shikumi-go types HTTPTimeout as a required, lower-bounded field."
  - id: NET-06
    dimension: networking
    enforcement: "gsds-net-auth flags req.Header.Set(\"Authorization\"/\"X-Api-Key\",...) outside an Auth.Apply impl and credential-shaped URL literals; secrets to BearerAuth/BasicAuth must come from shikumi-go/cofre (secret-scan cross-check)."
  - id: NET-07
    dimension: networking
    enforcement: "gsds-net-err flags strings.Contains(err.Error(),...) and bare returns of a network error without errors.Wrap; errcheck + errorlint enabled in the substrate Go check set."
  - id: NET-08
    dimension: networking
    enforcement: "gsds-net-client-lifetime flags todoku.New inside HandlerFunc bodies, loop bodies, or hot-path functions; clients must be struct fields constructed in main/factory; reinforced by DI-wiring review."
  - id: NET-09
    dimension: networking
    enforcement: "gsds-net-lifecycle flags direct signal.Notify/NotifyContext, srv.Close() on an http.Server, and an http.Server teardown not registered on a lifecycle.Shutdown; service-typed.nix daemon trio wires SIGTERM."
  - id: NET-10
    dimension: networking
    enforcement: "gsds-net-health flags manual mux.HandleFunc(\"/healthz\"|\"/readyz\",...) and a service main lacking lifecycle.Registry + reg.Handler() on the health port; service-typed.nix validates ports.health/healthcheck.path at nix-eval; probe points at /healthz:8081."
  - id: NET-11
    dimension: networking
    enforcement: "gsds-net-server-timeout: gosec G112/G114 (flags ListenAndServe + missing ReadHeaderTimeout) plus a custom analyzer requiring non-zero ReadTimeout/WriteTimeout/IdleTimeout sourced from config on every http.Server literal."
  - id: NET-12
    dimension: networking
    enforcement: "gsds-net-reqlog flags fmt.Print*/log.Print*/log.Println in handler/middleware packages and access-log middleware not calling logging.WithCorrelationID; forbidigo bans fmt.Println/std log fleet-wide; outbound correlation re-emission reviewed."
  - id: NET-13
    dimension: networking
    enforcement: "gsds-net-mw-order: analyzer asserts middleware.Chain is the only assembler and its layers appear in the mandated order (matched by known middleware names); routes bypassing Chain are flagged; recovery middleware logs via logging-go at SeverityError."

  # --- concurrency-and-jobs ------------------------------------------------
  - id: JOB-01
    dimension: concurrency-and-jobs
    enforcement: "library-check.nix go build ./... + golangci-lint nogofunc forbid bare `go ` and direct errgroup/sync.WaitGroup imports in non-test non-shigoto packages (allowlist needs //shigoto:exempt-leaf); shigoto.Advance is the only legal phase mutator (work-graph coverage check)."
  - id: JOB-02
    dimension: concurrency-and-jobs
    enforcement: "JobID is a comparable struct used as a map key; analyzer flags JobID literals referencing time.Now/rand/uuid/&; mandated TestJobIDStableAcrossCycles asserts byte-equal JobID sets across two builds."
  - id: JOB-03
    dimension: concurrency-and-jobs
    enforcement: "ctxfirst analyzer requires ctx as Execute's first param and flags blocking calls ignoring it; go vet + -race + goleak.VerifyTestMain catch leaked goroutines; per-Job Test<Kind>ExecuteIdempotent runs Execute twice."
  - id: JOB-04
    dimension: concurrency-and-jobs
    enforcement: "scheduler evaluateGates installs AllUpstreamsTerminal from the DAG (wrong-order TickReceipt observable); startup smoke test asserts dag.Validate() is called and checked (errcheck forbids discard); errors.Is(err, shigoto.ErrCycle) is the mandated branch."
  - id: JOB-05
    dimension: concurrency-and-jobs
    enforcement: "noadhocloop forbids time.Sleep in a for and bare time.NewTicker/time.Tick in service packages, directing to lifecycle.RunLoop; TestLoopStopsOnContextCancel asserts RunLoop returns ctx.Err(); goleak verifies no surviving loop goroutine."
  - id: JOB-06
    dimension: concurrency-and-jobs
    enforcement: "Lint forbids make(chan struct{}, n) token pools and x/sync/semaphore in service packages (route to BudgetTree); TestBudgetNeverExceeds under -race asserts RunningKind never exceeds MaxConcurrent; scheduler runJob always Releases."
  - id: JOB-07
    dimension: concurrency-and-jobs
    enforcement: "noinlineretry flags retry loops + external retry-lib imports inside shigoto.Job packages; TestRetryDeadletters asserts Deadlettered after exactly N attempts via TickReceipt transitions; jitter determinism asserted reproducible."
  - id: JOB-08
    dimension: concurrency-and-jobs
    enforcement: "containedctx + contextcheck + a custom ctxfirst analyzer (ctx is param 0, named ctx, forwarded) in golangci-lint; go vet lostcancel; mandated goleak in TestMain fails on a goroutine surviving a cancelled ctx."
  - id: JOB-09
    dimension: concurrency-and-jobs
    enforcement: "goleak.VerifyTestMain fails the suite on any surviving goroutine; noownerless-go flags a `go ` whose enclosing constructor lacks a shutdown.Add; TestShutdownBoundedByDeadline asserts a ctx-ignoring hook is skipped, never hung-on."
  - id: JOB-10
    dimension: concurrency-and-jobs
    enforcement: "errcheck + noconcurrentdrop flag errors in go func/hook/Job bodies not sent to a collector or returned; TestWaveAggregatesAllErrors asserts SeverityOf(join)==max and errors.Is matches each member; TestShutdownJoinsHookErrors."
  - id: JOB-11
    dimension: concurrency-and-jobs
    enforcement: "puregate analyzer flags http/sql/exec/os calls inside any shigoto.Gate; TestGateIsPure runs Check 1000x asserting identical results + zero IO syscalls; TestGateCohortWorstWins asserts the CheckAll short-circuit."
  - id: JOB-12
    dimension: concurrency-and-jobs
    enforcement: "Advance is the only function returning a new JobPhase from a Signal; notestonlyinprod flags SetPhase outside _test.go; TestIllegalTransitionRejected + TestEveryTransitionViaAdvance verify the FSM coverage table."
  - id: JOB-13
    dimension: concurrency-and-jobs
    enforcement: "requireemitter flags NewScheduler in main not followed by WithEmitter; a build-tag-gated startup assertion fails on a NullEmitter outside tests; TestTimeoutMapsToFailed sets SetTimeout and validates the JSONL audit line."
  - id: JOB-14
    dimension: concurrency-and-jobs
    enforcement: "noignoredreceipt flags a Tick whose TickReceipt is discarded; TestUnhealedSurfaced asserts deterministic Unhealed order, a WarnContext line with correlation_id, and an incremented alert metric."

  # --- documentation-and-discoverability -----------------------------------
  - id: DOC-01
    dimension: documentation-and-discoverability
    enforcement: "check-all runs go doc per package (fail on empty synopsis) + a package-doc-shape analyzer failing on a missing doc.go (multi-file), a non-package-clause doc.go, or a missing mandate sentinel; caixa-validate blocks Biblioteca -> documented without a synopsis."
  - id: DOC-02
    dimension: documentation-and-discoverability
    enforcement: "golangci-lint revive exported + package-comments (error) + godot wired into check-all; shared lint config; zero-tolerance: any exported finding fails and blocks merge."
  - id: DOC-03
    dimension: documentation-and-discoverability
    enforcement: "A custom doc-link analyzer in check-all requires backtick/bareword exported references to be [...] doc links; go vet doclink checking enabled so unresolved links fail the build."
  - id: DOC-04
    dimension: documentation-and-discoverability
    enforcement: "check-all go test ./... executes all Example* with Output: comments; an examples-coverage linter fails if a //gsds:example-required symbol has no Example; caixa-validate blocks documented -> publishable until >=1 executed example per package."
  - id: DOC-05
    dimension: documentation-and-discoverability
    enforcement: "A README-shape linter (check-all) parses the markdown AST and fails on missing/out-of-order/empty required ## anchors, a ## Install lacking go get + Nix snippet, or a ## Release lacking a CHANGELOG link; spec from gsds-readme-sections.yaml; caixa-validate documented requires all six anchors."
  - id: DOC-06
    dimension: documentation-and-discoverability
    enforcement: "A changelog linter in check-all fails on non-canonical groups, malformed dates, or a missing [Unreleased]; the release helper refuses a tag without a matching dated section (publishable -> released gate); go/apidiff requires an [Unreleased] entry for exported-API changes."
  - id: DOC-07
    dimension: documentation-and-discoverability
    enforcement: "check-all runs go vet + local pkgsite render asserting every exported symbol + resolved links, a LICENSE/module-path check, and a post-release live pkg.go.dev probe."
  - id: DOC-08
    dimension: documentation-and-discoverability
    enforcement: "A doc-dependency-coherence linter reads go.mod and fails if an imported mandated lib is missing from the README 'Built on' list or its symbols are referenced un-doc-linked; an anti-duplication heuristic flags re-implemented capabilities; 'Built on' is generated by forge."
  - id: DOC-09
    dimension: documentation-and-discoverability
    enforcement: "forge doc navigate-test (CI) confirms README answers what/install/usage above the fold, >=1 executed example, and a non-empty pkg.go.dev synopsis; a quarterly agent run does a live cold-open sample; caixa-validate documented aggregates DOC-01..DOC-08."
  - id: DOC-10
    dimension: documentation-and-discoverability
    enforcement: "All DOC checks implemented as Rust analyzers / go vet / golangci-lint / go test wired into check-all + caixa-validate; specs in shared YAML; a meta-lint fails if any doc step is a writeShellScript/bash/zsh script."

  # --- versioning-and-compatibility ----------------------------------------
  - id: VER-01
    dimension: versioning-and-compatibility
    enforcement: "forge tool bump parses via version.rs parse_semver (bail! on non-X.Y.Z) and bump_semver (enforces patch/minor/major); CI rejects any tag push failing ^v\\d+\\.\\d+\\.\\d+$."
  - id: VER-02
    dimension: versioning-and-compatibility
    enforcement: "go vet + a forge check assert the go.mod module suffix == MAJOR of the latest tag (Tagged blocked when MAJOR>=2 and suffix absent/mismatched); library-flake/workspace-release-flake accept modRoot; go build ./... fails on suffix/import mismatch."
  - id: VER-03
    dimension: versioning-and-compatibility
    enforcement: "forge tool release is the only tagging path; CI/branch-protection rejects tags not matching ^v\\d+\\.\\d+\\.\\d+$ and any force-update/deletion of an existing v* tag; the module proxy enforces immutability downstream."
  - id: VER-04
    dimension: versioning-and-compatibility
    enforcement: "version.rs has no go.mod reader (nothing to read); forge tool bump --language go computes the next version from the latest tag; substrate builders inject version via ldflags; CI fails if a VERSION file or var Version literal is committed."
  - id: VER-05
    dimension: versioning-and-compatibility
    enforcement: "CI runs an apidiff between the latest tag and HEAD; on v1+ an incompatible change blocks Tagged unless the bump is major; on v0 the diff is advisory; forge tool bump's level argument selects which promise applies."
  - id: VER-06
    dimension: versioning-and-compatibility
    enforcement: "forge tool release validates go.mod suffix == new MAJOR before tagging (FSM gate); go build ./... fails on un-rewritten intra-module imports; a CI invariant asserts prior-major tags still resolve via the proxy."
  - id: VER-07
    dimension: versioning-and-compatibility
    enforcement: "staticcheck SA1019 flags use of deprecated identifiers; a forge check asserts a removed exported identifier carried // Deprecated: for >=1 prior minor and the current bump is major; lint rejects deprecation warnings not via logging-go."
  - id: VER-08
    dimension: versioning-and-compatibility
    enforcement: "forge tool release generates notes from <prev-tag>..HEAD and cross-checks classification vs bump level (major needs a breaking entry; minor needs a feature + zero breaking; patch fixes-only); CI rejects empty notes or a classification contradicting apidiff."
  - id: VER-09
    dimension: versioning-and-compatibility
    enforcement: "forge tool release validates pre-release tag shape and refuses to mark an -rc tag Released; a CI gate scans every released module's go.mod and fails Tagged if any pleme-io require is a pseudo-version or pre-release; go mod verify in the sandbox."
  - id: VER-10
    dimension: versioning-and-compatibility
    enforcement: "mkGoLibraryCheck/build flakes run go build ./... and release runs go mod verify; a CI gate runs go mod tidy and fails on a non-empty diff, fails on a relative-path replace in a release, and asserts every pleme-io require resolves at the right suffix; the go directive is asserted against the fleet floor."
  - id: VER-11
    dimension: versioning-and-compatibility
    enforcement: "library-flake/workspace-release-flake accept modRoot; forge tool release composes <modRoot>/vX.Y.Z and evaluates the suffix gate per module; CI rejects a path-prefix-less submodule tag and a repo-root vX.Y.Z tag when >1 go.mod exists; mkGoLibraryCheck builds with the declared modRoot."
  - id: VER-12
    dimension: versioning-and-compatibility
    enforcement: "forge tool release performs Checked -> Built -> Tagged atomically and is the only Tagged mutator; VER-01/02/03/05/06/08/09/10/11 gates evaluate at the Tagged boundary; tag immutability makes the state monotonic; the proxy's permanent cache makes Tagged observable fleet-wide."

  # --- testing-and-quality -------------------------------------------------
  - id: TEST-01
    dimension: testing-and-quality
    enforcement: "forge tool check --language go (via check-all); a vet-style analyzer rejects a *_test.go with >1 top-level Test*/Benchmark* over the same exported symbol without a []struct table; t.Run required for >1-case tests."
  - id: TEST-02
    dimension: testing-and-quality
    enforcement: "forge tool check --language go always passes -race; the GitHub Action (pleme-actions-shared-go-built) calls nix run .#check-all; CGO_ENABLED=1 in the substrate goToolchain (toolchain.nix) as -race requires."
  - id: TEST-03
    dimension: testing-and-quality
    enforcement: "forge tool check --language go computes coverage from a -covermode=atomic profile and exits non-zero below the caixa.lisp coverage_floor (80% baseline, typed Rust comparison); CI publishes the profile; shares the profile build with TEST-02."
  - id: TEST-04
    dimension: testing-and-quality
    enforcement: "forge tool check --language go runs golden tests without -update (stale golden fails); a lint asserts testdata/*.golden is committed; golden tests run under the same -race invocation; drift surfaces as a unified diff."
  - id: TEST-05
    dimension: testing-and-quality
    enforcement: "CI runs go test -fuzz=FuzzX -fuzztime=30s per target (failure-blocking) via forge tool check --language go; new crashers are written to testdata/fuzz/ and fail the build; a lint requires a Fuzz* target for packages importing encoding/* or defining Parse*/Decode*."
  - id: TEST-06
    dimension: testing-and-quality
    enforcement: "forge tool check --language go runs go vet then staticcheck ./... (either non-empty output fails); staticcheck pinned via the substrate devShell/toolchain; a custom analyzer rejects bare //nolint and reason-less //lint:ignore."
  - id: TEST-07
    dimension: testing-and-quality
    enforcement: "forge tool check --language go runs gofumpt -l . (fails on any listed file) before vet/staticcheck; gofumpt ships in the substrate Go devShell (devenv.nix mkGoDevShell) so local and CI use the identical binary."
  - id: TEST-08
    dimension: testing-and-quality
    enforcement: "The release/bump apps evaluate a shigoto.Gate (via CheckAll) whose Check returns (true,nil) only when forge tool check --language go exited 0; a red check holds the publish Job in Gated; the Gate is PURE (reads the recorded receipt)."
  - id: TEST-09
    dimension: testing-and-quality
    enforcement: "Tests run inside the network-less Nix build sandbox (a dialing unit test fails structurally); a custom analyzer flags http.Get/net.Dial to a non-loopback literal in _test.go outside the //go:build integration tag; integration tests run in a separate, non-publish-gating CI stage."
  - id: TEST-10
    dimension: testing-and-quality
    enforcement: "forge tool check --language go runs -race (a non-parallel-safe t.Parallel() test fails loudly); staticcheck/custom analyzer flags ambient time.Now()/rand. reachable from code under test without an injection seam; the pinned go 1.25.x toolchain (toolchain.nix) guarantees per-iteration loop-var semantics."
  - id: TEST-11
    dimension: testing-and-quality
    enforcement: "A custom analyzer flags strings.Contains(err.Error(),...) in _test.go (must use errors.Is/As against an errors-go sentinel) and ad-hoc log/Fprintf(os.Stderr,...) capture helpers (must use logging-go's test logger); review rejects bespoke config/CLI parsers in test helpers."
  - id: TEST-12
    dimension: testing-and-quality
    enforcement: "A custom analyzer requires *_test.go (other than *_internal_test.go) to declare package <pkg>_test; an internal-package test file not named *_internal_test.go fails, and an *_internal_test.go lacking the justification comment fails; runs in the same check-all pass as vet/staticcheck."

  # --- security-and-supply-chain -------------------------------------------
  - id: SEC-01
    dimension: security-and-supply-chain
    enforcement: "service-flake.nix sets CGO_ENABLED=0 (docker.nix mkGoServiceImage too); mkGoTool asserts versionLdflags/ldflags types at nix eval; a dynamically-linked binary fails the library-check gate; a non-substrate go build in a workflow is rejected by the NO-shell lint."
  - id: SEC-02
    dimension: security-and-supply-chain
    enforcement: "service-flake.nix exposes fipsBuild and conditionally merges GOEXPERIMENT=boringcrypto + GOFIPS=1; a post-build go tool nm/go version -m probe fails if boringcrypto symbols are absent when fipsBuild=true; the FIPS image carries org.pleme.fips=true (verified by image-scan)."
  - id: SEC-03
    dimension: security-and-supply-chain
    enforcement: "docker.nix mkGoDockerImage defaults user 65534:65534, asserts check.str user, and injects USER/HOME; image-scan (trivy) fails on config.User \"\"/\"0\"/\"root\"; PodSecurityStandard restricted rejects root at admission."
  - id: SEC-04
    dimension: security-and-supply-chain
    enforcement: "service-flake.nix sbom/sbomFormat wires sbom-emit.nix mkSbomAttestApp; the sbom-generate (syft) action runs in CI; in the shigoto-go release DAG push-image is downstream of sbom-attest and AllUpstreamsTerminal blocks the push until the attest Job Succeeds."
  - id: SEC-05
    dimension: security-and-supply-chain
    enforcement: "cve-gate.nix mkCveGateApp runs trivy image --input <tarball> --severity <failOn> --exit-code 1 --ignore-unfixed pre-push; image-scan double-covers; the shigoto-go DAG places cve-scan upstream of push-image (a finding deadletters the Job, AllUpstreamsTerminal keeps push Gated)."
  - id: SEC-06
    dimension: security-and-supply-chain
    enforcement: "cosign-sign.nix mkCosignSignApp (keyless) signs by digest; mkCosignVerifyApp enforces --certificate-identity-regexp + --certificate-oidc-issuer; provenance-attest action in CI; chart-level Kyverno verifyImages + sekiban admission gate K8s deploys."
  - id: SEC-07
    dimension: security-and-supply-chain
    enforcement: "distroless.nix mkDistrolessBase returns [cacert]+[tini] (no busybox); docker.nix mkGoDockerImage distroless swaps baseContents when true; image-scan enumerates the filesystem and fails if /bin/sh, /bin/busybox, or a package manager is present in a distroless-flagged profile."
  - id: SEC-08
    dimension: security-and-supply-chain
    enforcement: "docker.nix mkGoDockerImage builds standardLabels via docker-helpers.nix mkStandardLabels (auto source/url/documentation/created), emits via buildLayeredImage; image-scan/skopeo inspect asserts the required annotation keys (incl. source/revision) are non-empty."
  - id: SEC-09
    dimension: security-and-supply-chain
    enforcement: "govulncheck ./... runs via a tatara-script action on PR + nightly cron, failing only on a call-graph-reachable vuln; security-audit action provides the polymorphic dep-vuln layer; govulncheck pinned by the substrate Go devShell; in the release DAG govulncheck is upstream of build-image (a reachable-vuln deadletters it)."
  - id: SEC-10
    dimension: security-and-supply-chain
    enforcement: "tool.nix goVersionAssert throws at nix eval if go.mod is ahead of pkgs.go.version; buildGoModule vendorHash pins vendored deps; the dependency-update action opens an auto-PR on cron; a stale-vendor check fails if go mod vendor produces a diff."
  - id: SEC-11
    dimension: security-and-supply-chain
    enforcement: "secrets-scan (gitleaks) action runs on PR + pre-release with fail-on-found; secret fetches must go through todoku-go (a direct os.Getenv of a credential or an inline literal credential is flagged by lint); distroless + reproducible build prevent shell-readable secret hiding."
  - id: SEC-12
    dimension: security-and-supply-chain
    enforcement: "provenance-attest action emits the SLSA-style attestation alongside the cosign signature; tameshi computes the BLAKE3 Merkle tree; sekiban (K8s admission) + inshou (Nix rebuild) fail-close on a broken chain; the shigoto-go DAG sequences sign -> attest -> provenance -> publish; --skip-verification is logged via logging-go and surfaced in the action summary."

  # --- uiux-look-and-feel --------------------------------------------------
  - id: UI-01
    dimension: uiux-look-and-feel
    enforcement: "forbidigo + depguard ban lipgloss/charmbracelet/non-borealis TUI imports outside the borealis leaves and _test.go; grep gate requires a human-surface binary import borealis; gsds-ui-lint flags a theme/Styles literal authored outside borealis.FromConfig/Nord and raw ANSI escapes in Run/handler bodies; borealis.Render is the only sanctioned emitter."
  - id: UI-02
    dimension: uiux-look-and-feel
    enforcement: "gsds-ui-lint rejects hex-shaped string literals, ANSI escape literals, and lipgloss.Color(...) outside borealis/theme; staticcheck flags theme.Color from a non-token constant; colour flows only through borealis.Role + Theme.RoleColor; unit test asserts every domain state maps to a borealis.Role."
  - id: UI-03
    dimension: uiux-look-and-feel
    enforcement: "gsds-ui-lint flags strings.Repeat padding + integer Padding/Margin/Width literals in tool code (route to comp/style); a -o table command must resolve a comp.Tabler (rendered via comp.Table); golden tests pin aligned comp.Table/StatusList/KV/Header/Rule output."
  - id: UI-04
    dimension: uiux-look-and-feel
    enforcement: "a shared borealis/logging-go mapper turns errs.SeverityOf into a borealis.Role (exhaustive-linted like LevelForSeverity); gsds-ui-lint flags a comp.Glyph/Badge Role selected by strings.Contains/err.Error() rather than SeverityOf; golden table test asserts the Notice->Success/Info, Warning->Warning, Error->Danger map (exit/log/screen agree)."
  - id: UI-05
    dimension: uiux-look-and-feel
    enforcement: "forbidigo bans fmt.Fprint*(os.Stderr, err) and bespoke red-text helpers in cmd/command packages; grep gate asserts a cli-go CLI entrypoint is borealis.Execute/fangx.Execute (fang ColorScheme decorator); harness asserts a failing command's stderr carries the human message + a Code affix and no Go-internal wrapError noise (ERR-12 taint)."
  - id: UI-06
    dimension: uiux-look-and-feel
    enforcement: "gsds-ui-lint bans hand-rolled isatty/term.IsTerminal in tool code (route through the borealis colour-profile seam) and flags borealis styling on the -o json/-o yaml stdout path; conformance harness captures stdout/stderr separately asserting piped/-o json stdout is byte-clean (no SGR) while a forced-TTY run is styled."
  - id: UI-07
    dimension: uiux-look-and-feel
    enforcement: "gsds-ui-lint asserts the colour decision flows from borealis.Config.NoColor()/ColorMode (flags a direct os.LookupEnv(NO_COLOR) outside borealis); --no-color global maps to ColorNever; conformance test runs every command with NO_COLOR=1 asserting zero SGR escapes AND that each status row still carries its glyph/label (never colour-as-sole-signal)."
  - id: UI-08
    dimension: uiux-look-and-feel
    enforcement: "gsds-ui-lint flags a hand-rolled colour-profile/palette switch and colour emitted outside the borealis/lipgloss profile seam; harness renders a fixture under truecolor/256/16/no-colour asserting the role set stays distinguishable; an Accessible=true run asserts forms use huh accessible mode and no animated widget is constructed; Mode (auto/light/dark) governed through the same seam."
  - id: UI-09
    dimension: uiux-look-and-feel
    enforcement: "forbidigo + depguard ban a direct charm.land/huh import outside huhx/_test.go and a hand-rolled huh.Theme; gsds-ui-lint asserts every huh.NewForm is .WithTheme(huhx.HuhTheme(t)) and TTY-guarded with a non-interactive errors-go-error fallback; conformance test pipes empty stdin asserting a required-input prompt fails with exit 64 rather than hanging."
  - id: UI-10
    dimension: uiux-look-and-feel
    enforcement: "forbidigo + depguard ban direct charm.land/bubbletea + charm.land/bubbles imports outside bubblesx/tui/_test.go; gsds-ui-lint asserts spinner/progress/table models are built from bubblesx.New(t) and a live program is TTY-gated with a static-comp fallback; golden test asserts a tui component View equals the corresponding comp render; live widgets never touch the -o json/-o yaml data stream."
  - id: UI-11
    dimension: uiux-look-and-feel
    enforcement: "caixa-validate rejects a borealis import in a Biblioteca (:kind from caixa.lisp); depguard scopes fangx/huhx/bubblesx/tui imports to cmd/** + command packages (a leaf import in internal/<domain> fails); go build ./... + the closure-size check enforce the core-vs-leaf boundary (Law 6/Law 8); a domain type implements comp.Tabler/borealis.Renderable without importing a leaf."
  - id: UI-12
    dimension: uiux-look-and-feel
    enforcement: "gsds-ui-lint asserts borealis.Config is loaded via the shikumi cfg.Load/bootstrap.Config path and FromConfig is the only resolver (flags a borealis.Theme literal in tool code and a shikumi.Load inside a theme path); a no-shikumi.Load-in-FromConfig check mirrors CFG-01; a Theme captured in a package var is flagged (mirrors CFG-11); zero Config.Theme selects the Nord brand default."
