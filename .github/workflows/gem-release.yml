# Reusable workflow: tag-triggered RubyGems release.
#
# Usage (from a consumer repo, .github/workflows/release.yml):
#
#   on:
#     push:
#       tags: ['v*']
#
#   jobs:
#     gem:
#       uses: pleme-io/substrate/.github/workflows/gem-release.yml@main
#       with:
#         gem-name: pangea-aws    # matches <gem-name>.gemspec at repo root
#       secrets:
#         RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
#
# Delegates the actual sanity-check + build + push to
# pleme-io/actions/gem-publish (composite action backed by a tatara-
# lisp script). This workflow only derives the version from the tag
# and threads the API key through.

name: gem-release

on:
  workflow_call:
    inputs:
      gem-name:
        description: "Gem name (matches <gem-name>.gemspec at repo root)"
        type: string
        required: true
      ruby-version:
        description: "Ruby toolchain version"
        type: string
        default: "3.3"
      runner:
        description: "Runner label"
        type: string
        default: "ubuntu-24.04"
    secrets:
      RUBYGEMS_API_KEY:
        description: "RubyGems API key with push permission for this gem"
        required: true

jobs:
  derive-version:
    name: Derive gem version from tag
    runs-on: ${{ inputs.runner }}
    outputs:
      version: ${{ steps.derive.outputs.version }}
    steps:
      - id: derive
        uses: pleme-io/actions/derive-version-from-tag@v1

  publish:
    name: Build & push to rubygems.org
    needs: derive-version
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: pleme-io/actions/gem-publish@v1
        with:
          gem-name: ${{ inputs.gem-name }}
          tag-version: ${{ needs.derive-version.outputs.version }}
          ruby-version: ${{ inputs.ruby-version }}
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
