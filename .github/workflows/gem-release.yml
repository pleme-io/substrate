# Reusable workflow: tag-triggered RubyGems release.
#
# Defers to the per-repo `.#gem:push` app provided by ruby-gem-flake.nix
# (substrate/lib/build/ruby/build.nix → mkRubyGemPushApp), so the actual
# build/push transaction is governed by `forge gem push`. This workflow
# is just a thin tag-aware wrapper that authenticates to rubygems via
# the standard `GEM_HOST_API_KEY` env var.
#
# Usage (from a consumer repo, .github/workflows/release.yml):
#
#   on:
#     push:
#       tags: ['v*']
#
#   jobs:
#     gem:
#       uses: pleme-io/substrate/.github/workflows/gem-release.yml@main
#       with:
#         gem-name: pangea-aws    # informational; used to derive constant + sanity-check
#       secrets:
#         RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
#
# Sanity-check: the gemspec's VERSION constant must equal the tag's
# version (`v0.1.0` → `0.1.0`); a mismatch fails the workflow before
# the push to avoid publishing a phantom version. Substrate-bump
# keeps these in sync (see ansible-collection-auto-bump.yml for the
# analogous shape on the Galaxy side).

name: gem-release

on:
  workflow_call:
    inputs:
      gem-name:
        description: "Gem name (matches <gem-name>.gemspec at repo root)"
        type: string
        required: true
      runner:
        description: "Runner label"
        type: string
        default: "ubuntu-24.04"
    secrets:
      RUBYGEMS_API_KEY:
        description: "RubyGems API key with push permission for this gem"
        required: true

jobs:
  derive-version:
    name: Derive gem version from tag
    runs-on: ${{ inputs.runner }}
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Parse tag
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${REF_NAME#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  publish:
    name: Build & push via forge
    needs: derive-version
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Magic Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Sanity-check gemspec version matches tag
        env:
          GEM_NAME: ${{ inputs.gem-name }}
          TAG_VERSION: ${{ needs.derive-version.outputs.version }}
        run: |
          set -euo pipefail
          # Convert gem-name (kebab) → CamelCase module name and read VERSION.
          spec_version="$(ruby -e "
            require_relative 'lib/${GEM_NAME}/version'
            mod = '${GEM_NAME}'.split('-').map { |s| s.capitalize }.join
            print Object.const_get(mod + '::VERSION')
          ")"
          if [ "$spec_version" != "$TAG_VERSION" ]; then
            echo "Gemspec version ($spec_version) != tag version ($TAG_VERSION)" >&2
            exit 1
          fi

      - name: Push gem (forge)
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: nix run .#gem:push
