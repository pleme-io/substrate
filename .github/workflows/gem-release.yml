# Reusable workflow: tag-triggered RubyGems release.
#
# Usage (from a consumer repo, .github/workflows/release.yml):
#
#   on:
#     push:
#       tags: ['v*']
#
#   jobs:
#     gem:
#       uses: pleme-io/substrate/.github/workflows/gem-release.yml@main
#       with:
#         gem-name: pangea-aws    # matches <gem-name>.gemspec at repo root
#       secrets:
#         RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
#
# Why not `nix run .#gem:push`? The substrate mkRubyGemPushApp invokes
# forge with `--working-dir <flake-self>` — which on CI is a /nix/store
# read-only path. `gem build` writes the .gem alongside the gemspec
# and aborts with EACCES. Doing the build in $GITHUB_WORKSPACE
# (writable) and then `gem push`-ing avoids that landmine without
# requiring a forge change. The substrate flake's .#gem:push remains
# the local-dev entrypoint where srcDir is writable.

name: gem-release

on:
  workflow_call:
    inputs:
      gem-name:
        description: "Gem name (matches <gem-name>.gemspec at repo root)"
        type: string
        required: true
      ruby-version:
        description: "Ruby toolchain version"
        type: string
        default: "3.3"
      runner:
        description: "Runner label"
        type: string
        default: "ubuntu-24.04"
    secrets:
      RUBYGEMS_API_KEY:
        description: "RubyGems API key with push permission for this gem"
        required: true

jobs:
  derive-version:
    name: Derive gem version from tag
    runs-on: ${{ inputs.runner }}
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Parse tag
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${REF_NAME#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  publish:
    name: Build & push to rubygems.org
    needs: derive-version
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ inputs.ruby-version }}
          bundler-cache: false

      - name: Sanity-check gemspec version matches tag
        env:
          GEM_NAME: ${{ inputs.gem-name }}
          TAG_VERSION: ${{ needs.derive-version.outputs.version }}
        run: |
          set -euo pipefail
          spec_version="$(ruby -e "
            require_relative 'lib/${GEM_NAME}/version'
            mod = '${GEM_NAME}'.split('-').map { |s| s.capitalize }.join
            print Object.const_get(mod + '::VERSION')
          ")"
          if [ "$spec_version" != "$TAG_VERSION" ]; then
            echo "Gemspec version ($spec_version) != tag version ($TAG_VERSION)" >&2
            exit 1
          fi

      - name: Build gem
        env:
          GEM_NAME: ${{ inputs.gem-name }}
        run: gem build "${GEM_NAME}.gemspec"

      - name: Push to RubyGems
        env:
          GEM_NAME: ${{ inputs.gem-name }}
          VERSION: ${{ needs.derive-version.outputs.version }}
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          set -euo pipefail
          gem_file="${GEM_NAME}-${VERSION}.gem"
          # Tolerate identical-version re-push so the workflow stays
          # restartable on transient downstream failures. RubyGems has
          # used two error phrasings over time:
          #   - "has already been pushed"            (older gem cli)
          #   - "Repushing of gem versions is not allowed" (current)
          if ! gem push "$gem_file" 2> push.err; then
            if grep -qE 'has already been pushed|Repushing of gem versions' push.err; then
              echo "Version $VERSION already published; treating as success."
            else
              cat push.err >&2
              exit 1
            fi
          fi
