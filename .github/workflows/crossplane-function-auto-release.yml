# Reusable workflow: publish a Crossplane composition-Function package on push to
# main — the AUTO-RELEASE (default-on, ship-on-merge) shape for a repo that ships
# ONE Crossplane Function whose runtime image is Nix-built (Pillar 8, no
# Dockerfile).
#
# Why this exists (vs crossplane-provider-publish.yml):
#   - provider-publish is TAG-triggered + has no runtime image (a provider IS its
#     controller image, referenced separately).
#   - a composition Function embeds a runtime image (the function-sdk-go gRPC
#     server) INTO the xpkg via `crossplane xpkg build
#     --embed-runtime-image-tarball`. That runtime image is a Nix `dockerTools`
#     build — so the build + embed + push is the consumer's typed `.#function-release`
#     flake app (= substrateLib.mkCrossplaneFunctionReleaseApp → forge crossplane
#     function-release). This workflow just runs it on merge.
#
# Version model: hermetic-by-digest. Every push to main publishes a `sha-<short>`
# tag; the consuming cluster's Function CR pins `@sha256:<digest>` (the ★★
# HERMETIC SUPPLY CHAIN model — no floating tag at apply time). A human-readable
# semver tag is published on demand via workflow_dispatch with `tag: v0.1.0`.
#
# Usage (consumer repo, the whole footprint):
#   # .github/workflows/auto-release.yml
#   on:
#     push: { branches: [main] }
#     workflow_dispatch: { inputs: { tag: { required: false } } }
#   jobs:
#     release:
#       uses: pleme-io/substrate/.github/workflows/crossplane-function-auto-release.yml@main
#       with:
#         tag: ${{ inputs.tag || '' }}
#       secrets: inherit

name: crossplane-function-auto-release

on:
  workflow_call:
    inputs:
      release-app:
        description: "Flake app that builds the runtime image + calls forge crossplane function-release."
        type: string
        default: "function-release"
      tag:
        description: "Explicit tag to publish (e.g. v0.1.0). Empty ⇒ derive sha-<short> from the merge commit."
        type: string
        default: ""
      registry-host:
        description: "OCI registry host to log into for the push."
        type: string
        default: "ghcr.io"
      runner:
        description: "Explicit runner label override; empty = route by caller repo visibility (private → camelot-builder-pleme-eks, public → ubuntu-24.04) -- same self-routing idiom as nix-image-auto-release.yml's own resolve job. Do NOT put an expression in this default — workflow_call input defaults are static; the fallback lives in the resolve job's runs-on."
        type: string
        default: ""
      extraSubstituters:
        description: "Extra Nix binary-cache URL(s) to pull from (space-separated) -- e.g. the in-cluster sui super-cache daemon (http://sui.camelot-build.svc) so heavy builds SUBSTITUTE instead of compiling. Same input shape as image-push.yml/nix-image-auto-release.yml's own extraSubstituters (mirrored here -- this reusable had never carried it, confirmed live: pitr-tools' function-release.yml, its sole consumer, had no cache knob at all despite self-routing onto camelot-builder-pleme-eks). Empty (default) = no extra cache, zero blast radius for existing consumers."
        type: string
        default: ""
      extraTrustedPublicKeys:
        description: "Trusted public key(s) for extraSubstituters (space-separated, 'name:base64' form). Required when extraSubstituters is set and require-sigs isn't relaxed, else Nix refuses the unsigned/untrusted cache."
        type: string
        default: ""
      requireSigs:
        description: "Set 'false' to accept UNSIGNED NARs from extraSubstituters -- e.g. sui serves unsigned closures. Empty = nix default (signatures required; zero blast radius for existing consumers)."
        type: string
        default: ""
    secrets:
      GHCR_TOKEN:
        description: "Token with write:packages on the target registry. Falls back to GITHUB_TOKEN."
        required: false

permissions:
  contents: read
  packages: write

jobs:
  # Runner routing lives in its own job -- same reason + same shape as
  # nix-image-auto-release.yml's own `resolve` job: `runs-on:` can only
  # read github/needs/strategy/matrix/vars/inputs contexts, and
  # github.event.repository.private (the caller's event payload) is the
  # ONLY reliable signal on pleme-io's GitHub Free org plan, which does
  # NOT share org-level vars/secrets into private repos' workflow-
  # evaluation context (confirmed live: pitr-tools/function-release.yml,
  # the sole consumer, is PRIVATE and was passing `vars.CAMELOT_IMAGE_RUNNER
  # || 'ubuntu-24.04'` -- the org var silently resolved empty, so every run
  # billed GitHub-hosted ubuntu-24.04 minutes instead of ever reaching the
  # self-hosted camelot pool this default exists to route to).
  resolve:
    name: Resolve runner
    runs-on: ${{ github.event.repository.private && 'camelot-builder-pleme-eks' || 'ubuntu-latest' }}
    outputs:
      runner: ${{ steps.resolve.outputs.runner }}
    steps:
      - name: Resolve runner
        id: resolve
        uses: pleme-io/actions/runner-resolve@main
        with:
          default: ${{ github.event.repository.private && 'camelot-builder-pleme-eks' || 'ubuntu-24.04' }}
          override: ${{ inputs.runner }}

  publish:
    name: Build + embed runtime image + push Function xpkg
    needs: resolve
    runs-on: ${{ needs.resolve.outputs.runner }}
    # Never re-trigger on a bot's own pushes.
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: false
          extra-conf: |
            sandbox = relaxed
            ${{ inputs.extraSubstituters && format('extra-substituters = {0}', inputs.extraSubstituters) || '' }}
            ${{ inputs.extraTrustedPublicKeys && format('extra-trusted-public-keys = {0}', inputs.extraTrustedPublicKeys) || '' }}
            ${{ inputs.requireSigs && format('require-sigs = {0}', inputs.requireSigs) || '' }}

      - name: Resolve tag
        id: tag
        env:
          EXPLICIT: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ -n "${EXPLICIT}" ]; then
            tag="${EXPLICIT}"
          else
            tag="sha-$(git rev-parse --short HEAD)"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Registry login
        env:
          HOST: ${{ inputs.registry-host }}
          TOKEN: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN || github.token }}
        # crossplane's `xpkg push` authenticates via the standard Docker keychain
        # (go-containerregistry reads ~/.docker/config.json). The crossplane CLI
        # has NO `xpkg login` subcommand — `docker login` writes the credential
        # crossplane then reads.
        run: |
          set -euo pipefail
          echo "$TOKEN" | docker login "$HOST" -u "${{ github.actor }}" --password-stdin

      - name: Build + push Function xpkg (Nix-built runtime image embedded)
        env:
          RELEASE_APP: ${{ inputs.release-app }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          nix run ".#${RELEASE_APP}" -- "$TAG"

      - name: Summary
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: echo "::notice title=Crossplane function publish::Published Function xpkg tag ${TAG}. Pin the cluster's Function CR to its @sha256 digest (HERMETIC SUPPLY CHAIN)."
