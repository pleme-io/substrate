name: cargo-auto-release

# Reusable workflow: on push to main, bump a single-crate Rust
# repo's package.version, commit, tag, push, publish to crates.io.
#
# Use this for non-workspace Rust repos (single library or single
# binary). For workspace repos use rust-auto-release.yml instead.
#
# Consumer (.github/workflows/auto-release.yml):
#
#   on: { push: { branches: [main] } }
#   jobs:
#     release:
#       uses: pleme-io/substrate/.github/workflows/cargo-auto-release.yml@main
#       secrets: inherit

on:
  workflow_call:
    inputs:
      bump-type:
        type: string
        required: false
        default: patch
      source-paths:
        type: string
        required: false
        default: "src Cargo.toml Cargo.lock"
      add-paths:
        type: string
        required: false
        default: "Cargo.toml Cargo.lock Cargo.nix Cargo.gen.lock"
      no-verify:
        type: string
        required: false
        default: "true"
      regenerate-cargo-nix:
        description: "Regenerate Cargo.nix via crate2nix after bump. Set false for path-dep crates."
        type: string
        required: false
        default: "true"
      # Runner routing: empty default routes by CALLER repo visibility —
      # private repos → the org-scoped camelot-builder-pleme ARC pool (avoids billed
      # hosted minutes; org runner groups refuse public repos anyway), public
      # repos → ubuntu-latest. Schedule-triggered callers may lack
      # github.event.repository and fall open to hosted (documented edge).
      # Do NOT put an expression in this default — workflow_call input
      # defaults are static; the fallback lives in each job's runs-on.
      runner:
        description: "Explicit runner label override; empty = route by caller repo visibility (private → camelot-builder-pleme, public → ubuntu-latest)."
        type: string
        required: false
        default: ""
    secrets:
      CRATES_API_TOKEN:
        required: true
      BOT_PAT:
        required: false

permissions:
  contents: write

# Serialize releases per repository — two pushes to main otherwise race two
# bump runs from the same base and the second push is rejected non-ff (its
# bump lost). Queue rather than cancel; an in-flight release must finish.
# Only the entry workflow's concurrency is honored by GitHub.
concurrency:
  group: auto-release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ${{ inputs.runner != '' && inputs.runner || (github.event.repository.private && 'camelot-builder-pleme' || 'ubuntu-latest') }}
    if: github.actor != 'github-actions[bot]'
    outputs:
      bumped: ${{ steps.bump.outputs.bumped }}
      new-version: ${{ steps.bump.outputs.new-version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}

      - id: bump
        uses: pleme-io/actions/cargo-bump@main
        with:
          bump-type: ${{ inputs.bump-type }}
          source-paths: ${{ inputs.source-paths }}
          regenerate-cargo-nix: ${{ inputs.regenerate-cargo-nix }}

      - if: steps.bump.outputs.bumped == 'true'
        uses: pleme-io/actions/git-commit-tag@main
        with:
          version: ${{ steps.bump.outputs.new-version }}
          add-paths: ${{ inputs.add-paths }}

      - if: steps.bump.outputs.bumped == 'true'
        uses: pleme-io/actions/git-push-with-token@main
        with:
          token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          branch: main
          push-tags: "true"

  ship:
    needs: bump
    runs-on: ${{ inputs.runner != '' && inputs.runner || (github.event.repository.private && 'camelot-builder-pleme' || 'ubuntu-latest') }}
    # privacy posture 2026-07-05: private repos bump+tag only — no public
    # registry publish; see pangea-architectures PRIVACY-WAVES.md. Publishing
    # a new version from a private repo leaks code to crates.io and undoes
    # yanks. Same caller-visibility expression family as the runner routing
    # above (in a workflow_call the github context is the CALLER's run).
    # Nothing depends on this job, so a visibility-skip fails nothing downstream.
    if: needs.bump.outputs.bumped == 'true' && !github.event.repository.private
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}

      - uses: pleme-io/actions/cargo-publish-crate@main
        with:
          no-verify: ${{ inputs.no-verify }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_API_TOKEN }}
