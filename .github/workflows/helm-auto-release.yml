name: helm-auto-release

# Reusable workflow: on push to main, bump a Helm chart's
# version, commit, tag, push, helm-package + push to OCI registry.

on:
  workflow_call:
    inputs:
      bump-type:
        type: string
        required: false
        default: patch
      registry:
        type: string
        required: false
        default: "ghcr.io/pleme-io/helm"
      source-paths:
        type: string
        required: false
        default: "templates values.yaml Chart.yaml"
      add-paths:
        type: string
        required: false
        default: "Chart.yaml"
      # Runner routing: empty default routes by CALLER repo visibility —
      # private repos → the org-scoped camelot-builder-pleme-eks ARC pool (avoids billed
      # hosted minutes; org runner groups refuse public repos anyway), public
      # repos → ubuntu-latest. Schedule-triggered callers may lack
      # github.event.repository and fall open to hosted (documented edge).
      # Do NOT put an expression in this default — workflow_call input
      # defaults are static; the fallback lives in each job's runs-on.
      runner:
        description: "Explicit runner label override; empty = route by caller repo visibility (private → camelot-builder-pleme-eks, public → ubuntu-latest)."
        type: string
        required: false
        default: ""
    secrets:
      BOT_PAT:
        required: false

permissions:
  contents: write
  packages: write

jobs:
  bump:
    runs-on: ${{ inputs.runner != '' && inputs.runner || (github.event.repository.private && 'camelot-builder-pleme-eks' || 'ubuntu-latest') }}
    if: github.actor != 'github-actions[bot]'
    outputs:
      bumped: ${{ steps.bump.outputs.bumped }}
      new-version: ${{ steps.bump.outputs.new-version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}

      - id: bump
        uses: pleme-io/actions/helm-bump@main
        with:
          bump-type: ${{ inputs.bump-type }}
          source-paths: ${{ inputs.source-paths }}

      - if: steps.bump.outputs.bumped == 'true'
        uses: pleme-io/actions/git-commit-tag@main
        with:
          version: ${{ steps.bump.outputs.new-version }}
          add-paths: ${{ inputs.add-paths }}

      - if: steps.bump.outputs.bumped == 'true'
        uses: pleme-io/actions/git-push-with-token@main
        with:
          token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          branch: main
          push-tags: "true"

  ship:
    needs: bump
    runs-on: ${{ inputs.runner != '' && inputs.runner || (github.event.repository.private && 'camelot-builder-pleme-eks' || 'ubuntu-latest') }}
    if: needs.bump.outputs.bumped == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}

      - uses: pleme-io/actions/helm-publish@main
        with:
          registry: ${{ inputs.registry }}
        env:
          # ghcr.io accepts GITHUB_TOKEN as the OCI registry password
          GHCR_TOKEN: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
