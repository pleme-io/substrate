# Reusable workflow: publish a Nix-built OCI image on push to main — the
# AUTO-RELEASE shape for a repo whose artifact is a `dockerTools` image exposed
# as a `nix run .#release` app (substrateLib.mkImageReleaseApp → forge
# image-release). Pillar 8: the image is Nix-built, never a Dockerfile.
#
# Complements:
#   - container-stack.yml      → Dockerfile (docker-build-and-push) images
#   - crossplane-function-auto-release.yml → Function xpkg (embeds a Nix image)
# This one is for the plain multi-arch Nix image case.
#
# Usage (consumer repo, the whole footprint):
#   # .github/workflows/image-release.yml
#   on: { push: { branches: [main] } }
#   jobs:
#     release:
#       uses: pleme-io/substrate/.github/workflows/nix-image-auto-release.yml@main
#       secrets: inherit

name: nix-image-auto-release

on:
  workflow_call:
    inputs:
      release-app:
        description: "Flake app that builds + pushes the image (substrateLib.mkImageReleaseApp)."
        type: string
        default: "release"
      registry-host:
        description: "OCI registry host to log into for the push."
        type: string
        default: "ghcr.io"
      runner:
        description: "Explicit runner label override; empty = route by caller repo visibility (private → camelot-builder-pleme-eks, public → ubuntu-24.04). Do NOT put an expression in this default — workflow_call input defaults are static; the fallback lives in the resolve job's `default:` input to pleme-io/actions/runner-resolve, evaluated in its own job because runs-on: cannot read a same-job step output."
        type: string
        default: ""
      working-directory:
        description: "Directory containing the flake.nix that exposes release-app (default: repo root). Set for a monorepo tool that isn't at the repo root, e.g. a nested tools/<name>/flake.nix."
        type: string
        default: "."
      scan-before-push:
        description: "Zero-tolerance CVE gate (theory/SECURITY-LAYER.md §8's 'build-time pre-publish CVE gate'): build image-attr locally, scan the LOCAL tarball with pleme-io/actions/image-scan (trivy --input, no registry round-trip -- the image has never been pushed anywhere at this point), and only run release-app (the push) if the scan is clean. False (default) preserves every existing caller's exact atomic build+push behavior unchanged -- opt in per consumer."
        type: boolean
        default: false
      image-attr:
        description: "Flake package attribute for the raw image derivation (e.g. 'rabbitmqImage'). Required when scan-before-push is true -- this is what gets built+scanned before release-app pushes it."
        type: string
        default: ""
      scan-image-ref:
        description: "Human-readable image ref (e.g. ghcr.io/pleme-io/rabbitmq:3.13.7-nix0) used ONLY as the scan's log/output label when scan-before-push is true -- nothing is pulled from it."
        type: string
        default: ""
      scan-fail-on-severity:
        description: "Lowest severity that fails the scan-before-push gate: UNKNOWN | LOW | MEDIUM | HIGH | CRITICAL | none. UNKNOWN = zero-tolerance (every severity gates)."
        type: string
        default: "UNKNOWN"
      scan-ignore-unfixed:
        description: "Skip vulns without an available fix in the scan-before-push gate. Never loosen this as a substitute for a named, tracked .trivyignore exception."
        type: string
        default: "false"
      scan-ignore-file:
        description: "Path (relative to the repo root) to a .trivyignore-format file of named, tracked exceptions for the scan-before-push gate -- each entry must carry its own justification, never a blanket severity loosening. Empty (default) = no exceptions."
        type: string
        default: ""
      boot-check-cmd:
        description: "Correctness gate, run AFTER the CVE scan and BEFORE the push (a CVE-clean image that crashes at boot is worse than useless -- theory/CAMELOT.md's own hardened-images incident, 2026-07-17: mysql+rabbitmq both passed 0-CVE scans and neither could boot). Health command exec'd inside the started container via pleme-io/actions/container-boot-check (e.g. 'mysqladmin ping --silent', 'rabbitmq-diagnostics -q ping'). Empty (default) = no boot-check -- every existing caller keeps its current behavior unchanged; opt in per consumer, same shape as scan-before-push."
        type: string
        default: ""
      boot-check-image-ref:
        description: "Local tag to docker-load the scanned tarball as before boot-testing it (e.g. 'rabbitmq:3.13.7-nix3'). Required when boot-check-cmd is set."
        type: string
        default: ""
      boot-check-env:
        description: "Newline-separated KEY=VALUE pairs passed to the boot-check container (e.g. MYSQL_ROOT_PASSWORD=... for a dev-only smoke boot)."
        type: string
        default: ""
    secrets:
      BOT_PAT:
        description: "Org PAT with write:packages, preferred by registry-login for OCI push to the org-shared ghcr.io/pleme-io namespace (a repo-scoped GITHUB_TOKEN 403s cross-namespace). Reaches public repos only on the Free plan; private repos fall through to GITHUB_TOKEN."
        required: false
      GHCR_TOKEN:
        description: "Optional dedicated registry token. registry-login prefers BOT_PAT, then this, then GITHUB_TOKEN."
        required: false

permissions:
  contents: read
  packages: write

jobs:
  # Runner routing lives in its own job: GitHub Actions' `runs-on:` can only
  # reference github/needs/strategy/matrix/vars/inputs contexts — never a
  # same-job step output — so the resolution has to happen in a job of its
  # own and every consumer job depends on it via needs.resolve.outputs.runner.
  # pleme-io/actions/runner-resolve applies typed precedence (override >
  # repo-committed .github/runner.yml > this job's `default`). `default` here
  # is the same private→camelot-builder-pleme-eks / public→ubuntu-24.04 split
  # as before, keyed off github.event.repository.private (the caller's event
  # payload) rather than an org-level Actions variable: pleme-io is on the
  # GitHub Free org plan, which does not share org vars/secrets into private
  # repos' workflow-evaluation context, so a vars.*-based fallback silently
  # resolves empty there. Same idiom as helm-monorepo-auto-release.yml/
  # rust-auto-release.yml/python-auto-release.yml.
  resolve:
    name: Resolve runner
    # The resolve job itself needs somewhere to run before it can tell
    # `publish` where to run -- github.event.repository.private is directly
    # readable in runs-on: (no step-output dependency, unlike inputs.runner's
    # own default further down), so route THIS job the same private/public
    # way instead of hardcoding ubuntu-latest. Found live 2026-07-17: with
    # pleme-io's GitHub org billing/spending-limit blocked, every private
    # repo's resolve job (and therefore every downstream release-* job) was
    # failing before it ever reached the self-hosted pool this whole routing
    # exists to reach -- the routing job was itself the one still paying for
    # GitHub-hosted minutes.
    runs-on: ${{ github.event.repository.private && 'camelot-builder-pleme-eks' || 'ubuntu-latest' }}
    outputs:
      runner: ${{ steps.resolve.outputs.runner }}
    steps:
      - name: Resolve runner
        id: resolve
        uses: pleme-io/actions/runner-resolve@main
        with:
          default: ${{ github.event.repository.private && 'camelot-builder-pleme-eks' || 'ubuntu-24.04' }}
          override: ${{ inputs.runner }}

  publish:
    name: Build + push Nix image
    needs: resolve
    runs-on: ${{ needs.resolve.outputs.runner }}
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      # scan-before-push mode: build the raw image derivation LOCALLY first
      # (no push) so the CVE gate below scans it before it has ever touched
      # a registry. Skipped entirely in the default (false) mode, which
      # preserves every existing caller's exact atomic build+push step.
      - name: Build image locally (scan-before-push gate)
        if: inputs.scan-before-push
        env:
          IMAGE_ATTR: ${{ inputs.image-attr }}
        run: nix build ".#${IMAGE_ATTR}" --print-build-logs

      # A failing scan stops the job HERE (GitHub Actions' default: a job
      # stops at its first failing step) -- the push step below is
      # structurally unreachable on red, never merely advisory.
      - name: Zero-tolerance CVE gate (pre-publish — scans the LOCAL tarball, never a pushed image)
        if: inputs.scan-before-push
        uses: pleme-io/actions/image-scan@main
        with:
          image-ref: ${{ inputs.scan-image-ref }}
          local-archive: result
          fail-on-severity: ${{ inputs.scan-fail-on-severity }}
          ignore-unfixed: ${{ inputs.scan-ignore-unfixed }}
          ignore-file: ${{ inputs.scan-ignore-file }}

      # Correctness gate, after the CVE scan and before anything ships --
      # matching akeylesslabs/akeyless-main-repo's own camelot-hardened-images.yml
      # pattern exactly (that pipeline already learned this lesson: a
      # CVE-clean image that crashes at boot is worse than useless). docker
      # load, not a registry pull -- the same local tarball the scan step
      # above just cleared, never touched a registry yet.
      - name: Load image into Docker for boot-check
        if: inputs.boot-check-cmd != ''
        run: docker load -i result

      - name: Correctness gate (boot-check — a 0-CVE image that can't boot is not shippable)
        if: inputs.boot-check-cmd != ''
        uses: pleme-io/actions/container-boot-check@main
        with:
          image: ${{ inputs.boot-check-image-ref }}
          health-cmd: ${{ inputs.boot-check-cmd }}
          env: ${{ inputs.boot-check-env }}

      # Token-resolution overlay: BOT_PAT > GHCR_TOKEN > GITHUB_TOKEN lives
      # ONCE in the registry-login action (client: docker → ~/.docker/config.json,
      # the standard keychain forge image-release's skopeo/regctl push reads).
      - name: Registry login
        uses: pleme-io/actions/registry-login@main
        with:
          registry: ${{ inputs.registry-host }}
          client: docker
          username: ${{ github.actor }}
          bot-pat: ${{ secrets.BOT_PAT }}
          ghcr-token: ${{ secrets.GHCR_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: skopeo registries.conf (runner ships v1; nixpkgs skopeo needs v2)
        # The ubuntu runner's /etc/containers/registries.conf is v1; the nixpkgs
        # skopeo forge uses rejects it ("must be in v2 format"). Point skopeo at a
        # minimal v2 file via CONTAINERS_REGISTRIES_CONF.
        run: |
          set -euo pipefail
          conf="$RUNNER_TEMP/registries.conf"
          printf 'unqualified-search-registries = []\n' > "$conf"
          echo "CONTAINERS_REGISTRIES_CONF=$conf" >> "$GITHUB_ENV"

      # In scan-before-push mode the image derivation is already realized
      # from the build step above, so this is a fast no-rebuild push (a
      # cache-hit resolve + the mkPushApp skopeo copy), not a second build.
      - name: Build + push image (idempotent — <arch>-<sha> + <arch>-latest tags)
        env:
          RELEASE_APP: ${{ inputs.release-app }}
        run: nix run ".#${RELEASE_APP}"
