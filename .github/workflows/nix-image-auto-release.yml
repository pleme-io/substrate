# Reusable workflow: publish a Nix-built OCI image on push to main — the
# AUTO-RELEASE shape for a repo whose artifact is a `dockerTools` image exposed
# as a `nix run .#release` app (substrateLib.mkImageReleaseApp → forge
# image-release). Pillar 8: the image is Nix-built, never a Dockerfile.
#
# Complements:
#   - container-stack.yml      → Dockerfile (docker-build-and-push) images
#   - crossplane-function-auto-release.yml → Function xpkg (embeds a Nix image)
# This one is for the plain multi-arch Nix image case.
#
# Usage (consumer repo, the whole footprint):
#   # .github/workflows/image-release.yml
#   on: { push: { branches: [main] } }
#   jobs:
#     release:
#       uses: pleme-io/substrate/.github/workflows/nix-image-auto-release.yml@main
#       secrets: inherit

name: nix-image-auto-release

on:
  workflow_call:
    inputs:
      release-app:
        description: "Flake app that builds + pushes the image (substrateLib.mkImageReleaseApp)."
        type: string
        default: "release"
      registry-host:
        description: "OCI registry host to log into for the push."
        type: string
        default: "ghcr.io"
      runner:
        description: "Explicit runner label override; empty = route by caller repo visibility (private → camelot-builder-pleme-eks, public → ubuntu-24.04). Do NOT put an expression in this default — workflow_call input defaults are static; the fallback lives in the resolve job's `default:` input to pleme-io/actions/runner-resolve, evaluated in its own job because runs-on: cannot read a same-job step output."
        type: string
        default: ""
      working-directory:
        description: "Directory containing the flake.nix that exposes release-app (default: repo root). Set for a monorepo tool that isn't at the repo root, e.g. a nested tools/<name>/flake.nix."
        type: string
        default: "."
      scan-before-push:
        description: "Zero-tolerance CVE gate (theory/SECURITY-LAYER.md §8's 'build-time pre-publish CVE gate'): build image-attr locally, scan the LOCAL tarball with pleme-io/actions/image-scan (trivy --input, no registry round-trip -- the image has never been pushed anywhere at this point), and only run release-app (the push) if the scan is clean. False (default) preserves every existing caller's exact atomic build+push behavior unchanged -- opt in per consumer."
        type: boolean
        default: false
      image-attr:
        description: "Flake package attribute for the raw image derivation (e.g. 'rabbitmqImage'). Required when scan-before-push is true -- this is what gets built+scanned before release-app pushes it."
        type: string
        default: ""
      scan-image-ref:
        description: "Human-readable image ref (e.g. ghcr.io/pleme-io/rabbitmq:3.13.7-nix0) used ONLY as the scan's log/output label when scan-before-push is true -- nothing is pulled from it."
        type: string
        default: ""
      scan-fail-on-severity:
        description: "Lowest severity that fails the scan-before-push gate: UNKNOWN | LOW | MEDIUM | HIGH | CRITICAL | none. UNKNOWN = zero-tolerance (every severity gates)."
        type: string
        default: "UNKNOWN"
      scan-ignore-unfixed:
        description: "Skip vulns without an available fix in the scan-before-push gate. Never loosen this as a substitute for a named, tracked .trivyignore exception."
        type: string
        default: "false"
      scan-ignore-file:
        description: "Path (relative to the repo root) to a .trivyignore-format file of named, tracked exceptions for the scan-before-push gate -- each entry must carry its own justification, never a blanket severity loosening. Empty (default) = no exceptions."
        type: string
        default: ""
      boot-check-cmd:
        description: "Correctness gate, run AFTER the CVE scan and BEFORE the push (a CVE-clean image that crashes at boot is worse than useless -- theory/CAMELOT.md's own hardened-images incident, 2026-07-17: mysql+rabbitmq both passed 0-CVE scans and neither could boot). Health command exec'd inside the started container via pleme-io/actions/container-boot-check (e.g. 'mysqladmin ping --silent', 'rabbitmq-diagnostics -q ping'). Empty (default) = no boot-check -- every existing caller keeps its current behavior unchanged; opt in per consumer, same shape as scan-before-push."
        type: string
        default: ""
      boot-check-image-ref:
        description: "Local tag to docker-load the scanned tarball as before boot-testing it (e.g. 'rabbitmq:3.13.7-nix3'). Required when boot-check-cmd is set."
        type: string
        default: ""
      boot-check-env:
        description: "Newline-separated KEY=VALUE pairs passed to the boot-check container (e.g. MYSQL_ROOT_PASSWORD=... for a dev-only smoke boot)."
        type: string
        default: ""
      vulnix-scan:
        description: "Nix-closure CVE gate (vulnix, NVD-backed) -- complements scan-before-push's trivy gate, which structurally cannot see Nix-built images at all for whole classes of package: trivy's os-pkg scanner needs a dpkg/rpm/apk status DB (none exists in a Nix closure), and its language scanners only cover ecosystems with an embedded-buildinfo or lockfile scanner (Go, Rust) -- C/C++ and Erlang/OTP fall through both nets entirely. vulnix instead reads the package's own Nix derivation pname/version metadata against the NVD feed. Runs the consumer flake's own 'vulnix-scan:<name>' app (a nixpkgs-sourced vulnix, never an imperative install) against the package's runtime closure -- never the OCI image. False (default) preserves every existing caller unchanged; opt in per consumer, same shape as scan-before-push. A whitelist (vulnix's native TOML mechanism, the closure-scan sibling of a .trivyignore file) is a per-image Nix value in the consumer's own flake, not a workflow input here -- see pleme-io/hardened-images for the reference shape."
        type: boolean
        default: false
      vulnix-scan-app:
        description: "Flake app that runs the vulnix closure scan (e.g. 'vulnix-scan:mysql'). Required when vulnix-scan is true."
        type: string
        default: ""
      vulnix-scan-advisory-only:
        description: "Report vulnix findings without failing the job -- for a package whose closure has never been scanned before and has no committed whitelist baseline yet (a real, honest gap: an unscanned package's first run WILL surface findings nobody has triaged, and a hard gate on an untriaged baseline is indistinguishable from a broken pipeline). Flip to false (the default) once a real CI run's findings have seeded a committed vulnix whitelist for this package."
        type: boolean
        default: false
      grype-scan:
        description: "Second, independent CVE-database gate (Grype, Anchore) -- complements scan-before-push's trivy gate at the DATABASE layer, not the ecosystem layer: trivy and grype see the same OCI image but consult independent vuln feeds + matchers, so a finding either misses or mis-rates surfaces here even on an ecosystem trivy already covers (Go/Rust included -- unlike vulnix, grype is not restricted to trivy's structural blind spots). Runs the consumer flake's own 'grype-scan:<name>' app (a nixpkgs-sourced grype via substrate's mkCveGateApp, never an imperative install) against the SAME local docker-archive tarball scan-before-push already built -- no second build, no registry round-trip. False (default) preserves every existing caller unchanged; opt in per consumer, same shape as vulnix-scan. Requires scan-before-push (needs image-attr built first)."
        type: boolean
        default: false
      grype-scan-app:
        description: "Flake app that runs the grype image scan (e.g. 'grype-scan:mysql'). Required when grype-scan is true."
        type: string
        default: ""
      grype-scan-advisory-only:
        description: "Report grype findings without failing the job -- for an image whose grype baseline has never been triaged yet (same honest-gap rationale as vulnix-scan-advisory-only). Flip to false (the default) once a real CI run's findings have been triaged for this image."
        type: boolean
        default: false
      extraSubstituters:
        description: "Extra Nix binary-cache URL(s) to pull from (space-separated) -- e.g. the in-cluster sui super-cache daemon (http://sui.camelot-build.svc) so heavy builds SUBSTITUTE instead of compiling. Same input shape as image-push.yml's own extraSubstituters (mirrored here -- this reusable had never carried it, confirmed live: every hardened-images build paid full cold-compile cost despite running on the same cluster/VPC sui lives on). Empty (default) = no extra cache, zero blast radius for existing consumers."
        type: string
        default: ""
      extraTrustedPublicKeys:
        description: "Trusted public key(s) for extraSubstituters (space-separated, 'name:base64' form). Required when extraSubstituters is set and require-sigs isn't relaxed, else Nix refuses the unsigned/untrusted cache."
        type: string
        default: ""
      requireSigs:
        description: "Set 'false' to accept UNSIGNED NARs from extraSubstituters -- e.g. sui serves unsigned closures. Empty = nix default (signatures required; zero blast radius for existing consumers)."
        type: string
        default: ""
      sbom-attest:
        description: "Generate an SBOM (syft) from the just-built local tarball and cosign-attest it to the PUSHED image ref (substrate's mkSbomAttestApp) -- runs AFTER release-app, since attestation needs a real registry ref cosign/Rekor can record against. Requires cosign keyless signing (ambient GitHub Actions OIDC -- the caller must grant id-token: write, which this reusable's own top-level permissions block does). Runs the consumer flake's own 'sbom-attest:<name>' app. False (default) preserves every existing caller unchanged; opt in per consumer."
        type: boolean
        default: false
      sbom-attest-app:
        description: "Flake app that generates + attests the SBOM (e.g. 'sbom-attest:rabbitmq'). Required when sbom-attest is true."
        type: string
        default: ""
      cosign-sign:
        description: "Keyless-sign the PUSHED image ref (substrate's mkCosignSignApp, Sigstore Fulcio+Rekor -- no long-lived key to rotate). Runs the consumer flake's own 'cosign-sign:<name>' app, after release-app. False (default) preserves every existing caller unchanged; opt in per consumer."
        type: boolean
        default: false
      cosign-sign-app:
        description: "Flake app that runs the cosign sign (e.g. 'cosign-sign:rabbitmq'). Required when cosign-sign is true."
        type: string
        default: ""
    secrets:
      BOT_PAT:
        description: "Org PAT with write:packages, preferred by registry-login for OCI push to the org-shared ghcr.io/pleme-io namespace (a repo-scoped GITHUB_TOKEN 403s cross-namespace). Reaches public repos only on the Free plan; private repos fall through to GITHUB_TOKEN."
        required: false
      GHCR_TOKEN:
        description: "Optional dedicated registry token. registry-login prefers BOT_PAT, then this, then GITHUB_TOKEN."
        required: false

permissions:
  contents: read
  packages: write

jobs:
  # Runner routing lives in its own job: GitHub Actions' `runs-on:` can only
  # reference github/needs/strategy/matrix/vars/inputs contexts — never a
  # same-job step output — so the resolution has to happen in a job of its
  # own and every consumer job depends on it via needs.resolve.outputs.runner.
  # pleme-io/actions/runner-resolve applies typed precedence (override >
  # repo-committed .github/runner.yml > this job's `default`). `default` here
  # is the same private→camelot-builder-pleme-eks / public→ubuntu-24.04 split
  # as before, keyed off github.event.repository.private (the caller's event
  # payload) rather than an org-level Actions variable: pleme-io is on the
  # GitHub Free org plan, which does not share org vars/secrets into private
  # repos' workflow-evaluation context, so a vars.*-based fallback silently
  # resolves empty there. Same idiom as helm-monorepo-auto-release.yml/
  # rust-auto-release.yml/python-auto-release.yml.
  resolve:
    name: Resolve runner
    # The resolve job itself needs somewhere to run before it can tell
    # `publish` where to run -- github.event.repository.private is directly
    # readable in runs-on: (no step-output dependency, unlike inputs.runner's
    # own default further down), so route THIS job the same private/public
    # way instead of hardcoding ubuntu-latest. Found live 2026-07-17: with
    # pleme-io's GitHub org billing/spending-limit blocked, every private
    # repo's resolve job (and therefore every downstream release-* job) was
    # failing before it ever reached the self-hosted pool this whole routing
    # exists to reach -- the routing job was itself the one still paying for
    # GitHub-hosted minutes.
    runs-on: ${{ github.event.repository.private && 'camelot-builder-pleme-eks' || 'ubuntu-latest' }}
    outputs:
      runner: ${{ steps.resolve.outputs.runner }}
    steps:
      - name: Resolve runner
        id: resolve
        uses: pleme-io/actions/runner-resolve@main
        with:
          default: ${{ github.event.repository.private && 'camelot-builder-pleme-eks' || 'ubuntu-24.04' }}
          override: ${{ inputs.runner }}

  publish:
    name: Build + push Nix image
    needs: resolve
    runs-on: ${{ needs.resolve.outputs.runner }}
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: read
      packages: write
      # Needed only when cosign-sign/sbom-attest is true -- keyless cosign
      # signing exchanges this job's own short-lived OIDC token for a
      # Fulcio cert (no long-lived signing key to rotate). Granting it
      # unconditionally at the job level (GitHub Actions permissions can't
      # be conditioned on an input) is the standard, narrow shape: it lets
      # THIS job request an OIDC token scoped to itself, nothing more --
      # zero blast radius for callers that never set cosign-sign/sbom-attest.
      id-token: write
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: false
          extra-conf: |
            sandbox = relaxed
            ${{ inputs.extraSubstituters && format('extra-substituters = {0}', inputs.extraSubstituters) || '' }}
            ${{ inputs.extraTrustedPublicKeys && format('extra-trusted-public-keys = {0}', inputs.extraTrustedPublicKeys) || '' }}
            ${{ inputs.requireSigs && format('require-sigs = {0}', inputs.requireSigs) || '' }}

      # scan-before-push mode: build the raw image derivation LOCALLY first
      # (no push) so the CVE gate below scans it before it has ever touched
      # a registry. Skipped entirely in the default (false) mode, which
      # preserves every existing caller's exact atomic build+push step.
      - name: Build image locally (scan-before-push gate)
        if: inputs.scan-before-push
        env:
          IMAGE_ATTR: ${{ inputs.image-attr }}
        run: nix build ".#${IMAGE_ATTR}" --print-build-logs

      # A failing scan stops the job HERE (GitHub Actions' default: a job
      # stops at its first failing step) -- the push step below is
      # structurally unreachable on red, never merely advisory.
      - name: Zero-tolerance CVE gate (pre-publish — scans the LOCAL tarball, never a pushed image)
        if: inputs.scan-before-push
        uses: pleme-io/actions/image-scan@main
        with:
          image-ref: ${{ inputs.scan-image-ref }}
          local-archive: result
          fail-on-severity: ${{ inputs.scan-fail-on-severity }}
          ignore-unfixed: ${{ inputs.scan-ignore-unfixed }}
          ignore-file: ${{ inputs.scan-ignore-file }}

      # Second-opinion CVE-database gate (grype) -- sibling to the trivy gate
      # above, same artifact (the app builds `images_.<name>` as an ordinary
      # Nix build input, which is the same store path scan-before-push
      # already realized via `nix build ".#${image-attr}"` moments ago, so
      # this is a cache hit, not a second build). A failing scan (any
      # finding at/above the app's configured failOn threshold) stops the
      # job here, same as the trivy gate.
      - name: Zero-tolerance CVE gate #2 (grype -- independent CVE database + matcher from trivy)
        if: inputs.grype-scan
        continue-on-error: ${{ inputs.grype-scan-advisory-only }}
        env:
          GRYPE_SCAN_APP: ${{ inputs.grype-scan-app }}
        run: nix run ".#${GRYPE_SCAN_APP}"

      # vulnix's own NVD feed corpus is ~300MB and vulnix itself only
      # re-fetches a year's archive when NVD reports it changed (confirmed
      # live: a warm-cache re-scan against an unchanged corpus dropped from
      # ~60s to ~2.5s) -- restoring the most recent prior cache via
      # restore-keys (the key itself never matches exactly, so a fresh
      # cache is always saved after this job) makes every run after the
      # first a small incremental fetch instead of the full corpus, under
      # vulnix's own default cache dir so the generated vulnix-scan:<name>
      # app needs no CI-specific path override.
      - name: Restore vulnix NVD feed cache
        if: inputs.vulnix-scan
        uses: actions/cache@v4
        with:
          path: ~/.cache/vulnix
          key: vulnix-nvd-${{ github.run_id }}
          restore-keys: |
            vulnix-nvd-

      # Nix-closure CVE gate (vulnix) -- sibling to the trivy gate above,
      # covering the ecosystems it structurally cannot (see the vulnix-scan
      # input's own description). Scans the PACKAGE's closure, not the OCI
      # image -- no image build or docker-archive dependency, can run
      # independently of scan-before-push/boot-check. A failing scan (any
      # non-whitelisted finding) stops the job here, same as the trivy gate.
      - name: Nix-closure CVE gate (vulnix -- covers what the trivy gate above structurally cannot)
        if: inputs.vulnix-scan
        continue-on-error: ${{ inputs.vulnix-scan-advisory-only }}
        env:
          VULNIX_SCAN_APP: ${{ inputs.vulnix-scan-app }}
        run: nix run ".#${VULNIX_SCAN_APP}"

      # Correctness gate, after the CVE scan and before anything ships --
      # matching akeylesslabs/akeyless-main-repo's own camelot-hardened-images.yml
      # pattern exactly (that pipeline already learned this lesson: a
      # CVE-clean image that crashes at boot is worse than useless). docker
      # load, not a registry pull -- the same local tarball the scan step
      # above just cleared, never touched a registry yet.
      - name: Load image into Docker for boot-check
        if: inputs.boot-check-cmd != ''
        run: docker load -i result

      - name: Correctness gate (boot-check — a 0-CVE image that can't boot is not shippable)
        if: inputs.boot-check-cmd != ''
        uses: pleme-io/actions/container-boot-check@main
        with:
          image: ${{ inputs.boot-check-image-ref }}
          health-cmd: ${{ inputs.boot-check-cmd }}
          env: ${{ inputs.boot-check-env }}

      # Token-resolution overlay: BOT_PAT > GHCR_TOKEN > GITHUB_TOKEN lives
      # ONCE in the registry-login action (client: docker → ~/.docker/config.json,
      # the standard keychain forge image-release's skopeo/regctl push reads).
      - name: Registry login
        uses: pleme-io/actions/registry-login@main
        with:
          registry: ${{ inputs.registry-host }}
          client: docker
          username: ${{ github.actor }}
          bot-pat: ${{ secrets.BOT_PAT }}
          ghcr-token: ${{ secrets.GHCR_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: skopeo registries.conf (runner ships v1; nixpkgs skopeo needs v2)
        # The ubuntu runner's /etc/containers/registries.conf is v1; the nixpkgs
        # skopeo forge uses rejects it ("must be in v2 format"). Point skopeo at a
        # minimal v2 file via CONTAINERS_REGISTRIES_CONF.
        run: |
          set -euo pipefail
          conf="$RUNNER_TEMP/registries.conf"
          printf 'unqualified-search-registries = []\n' > "$conf"
          echo "CONTAINERS_REGISTRIES_CONF=$conf" >> "$GITHUB_ENV"

      # In scan-before-push mode the image derivation is already realized
      # from the build step above, so this is a fast no-rebuild push (a
      # cache-hit resolve + the mkPushApp skopeo copy), not a second build.
      - name: Build + push image (idempotent — <arch>-<sha> + <arch>-latest tags)
        env:
          RELEASE_APP: ${{ inputs.release-app }}
        run: nix run ".#${RELEASE_APP}"

      # Supply-chain attestation, AFTER the push: an SBOM (syft) generated
      # from the same local tarball scan-before-push already cleared, cosign-
      # attested to the now-real, now-pushed image ref (attestation needs a
      # registry ref Rekor's transparency log can record against -- there is
      # nothing to attest before the push exists). Uses this job's own
      # ambient GitHub Actions OIDC token (COSIGN_EXPERIMENTAL=1, no
      # long-lived key) -- the id-token: write permission above is what
      # makes that token available to request.
      - name: SBOM + cosign attest (supply-chain evidence for the pushed image)
        if: inputs.sbom-attest
        env:
          SBOM_ATTEST_APP: ${{ inputs.sbom-attest-app }}
          COSIGN_EXPERIMENTAL: "1"
        run: nix run ".#${SBOM_ATTEST_APP}"

      # Keyless cosign signature on the pushed ref -- same ambient OIDC as
      # the SBOM attestation above, a separate step so a consumer can opt
      # into signing without also generating an SBOM (or vice versa).
      - name: Cosign sign (keyless, Fulcio + Rekor)
        if: inputs.cosign-sign
        env:
          COSIGN_SIGN_APP: ${{ inputs.cosign-sign-app }}
          COSIGN_EXPERIMENTAL: "1"
        run: nix run ".#${COSIGN_SIGN_APP}"
