# OPTIONAL reusable iOS-game host-gate. The CANONICAL SDLC for an iOS game is
# LOCAL: the `nix run .#{check,watch,run-sim,game-device}` devloop in
# lib/build/swift/ios-game-flake.nix delivers to the simulator/phone attached to
# the operator's machine — a GitHub runner CANNOT reach a local VM/phone, so the
# DEPLOY half is never CI. This workflow only mirrors the LOCAL `nix run .#check`
# gate (lint/test/build-sim) on a macOS runner for teams that additionally want a
# PR regression gate AND have macOS Actions budget (macOS minutes bill 10×). It is
# strictly secondary to the local devloop; most repos need only `nix run .#check`.
#
# Consumer wrapper (≤10 lines, see pleme-io/asobi/.github/workflows/ci.yml):
#
#   name: ci
#   on: { push: { branches: [main] }, pull_request: {} }
#   jobs:
#     ci:
#       uses: pleme-io/substrate/.github/workflows/ios-game-ci.yml@main
#
# Gates run here: lint (clippy -D warnings) → test (host suite) → build-sim
# (cross-compile the app for the simulator target — proves the iOS toolchain).
# The LIVE-deploy verbs (run-sim / game-device) need a booted simulator / a
# tethered phone and stay operator-local — CI proves everything up to the artifact.
name: ios-game-ci

on:
  workflow_call:
    inputs:
      runner:
        description: "macOS runner label (must have Xcode for the iOS SDK)"
        type: string
        default: "macos-14"
      run-build-sim:
        description: "also cross-compile the app for the simulator target"
        type: boolean
        default: true

jobs:
  ci:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: lint (clippy -D warnings)
        run: nix run .#lint
      - name: test (host suite)
        run: nix run .#test
      - name: build-sim (cross-compile for the simulator)
        if: ${{ inputs.run-build-sim }}
        run: nix run .#build-sim
