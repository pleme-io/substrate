# Reusable workflow: run pleme-io/forge-gen against a caixa's OpenAPI
# spec, regenerate SDKs / MCP servers / IaC providers / completions /
# schemas / docs, and (optionally) commit + PR the result.
#
# Use this when a caixa wraps an external API and benefits from auto-
# generated typed surfaces. The forge pattern (`forge-gen`) ships
# the typed pipeline:
#
#     OpenAPI spec → sekkei (typed) → takumi (resolved IR) → (forge backends)
#
# Reusable surface mirrors caixa-publish.yml: one `uses:` line per
# consumer, all knobs have defaults.
#
# Consumer:
#   jobs:
#     forge:
#       uses: pleme-io/substrate/.github/workflows/caixa-forge.yml@main
#       with:
#         spec: spec/openapi.yaml         # default
#         outputs: "sdks,servers,iac"     # default: all
#       secrets: inherit
#       permissions:
#         contents: write                  # for the auto-PR

name: caixa-forge

on:
  workflow_call:
    inputs:
      spec:
        description: "Path to the OpenAPI spec (relative to repo root)."
        type: string
        default: "spec/openapi.yaml"
      outputs:
        description: "Comma-separated forge-gen outputs to regenerate. One or more of: sdks, servers, iac, mcp, completions, schemas, docs"
        type: string
        default: "sdks,servers,iac,mcp,completions,schemas,docs"
      runner:
        description: "Runner label"
        type: string
        default: "ubuntu-24.04"
      commitOnDrift:
        description: "Open a PR with the regenerated outputs if they drift from HEAD."
        type: boolean
        default: true
      branchPrefix:
        description: "Prefix for the auto-PR branch."
        type: string
        default: "forge/"

jobs:
  forge:
    name: Run forge-gen
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Magic Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Verify spec exists
        env:
          SPEC: ${{ inputs.spec }}
        run: |
          set -euo pipefail
          if [ ! -f "$SPEC" ]; then
            echo "::error::OpenAPI spec not found at $SPEC"
            exit 1
          fi
          echo "::notice::driving forge-gen against $SPEC"

      - name: Run forge-gen
        env:
          SPEC: ${{ inputs.spec }}
          OUTPUTS: ${{ inputs.outputs }}
        run: |
          set -euo pipefail
          # Translate "sdks,servers,iac,mcp,completions,schemas,docs"
          # into --sdks --servers --iac … flags. forge-gen accepts the
          # flags individually; this is just the lifting layer.
          flags=""
          IFS=',' read -ra parts <<< "$OUTPUTS"
          for p in "${parts[@]}"; do
            p=$(echo "$p" | tr -d ' ')
            case "$p" in
              sdks)        flags="$flags --sdks" ;;
              servers)     flags="$flags --servers" ;;
              iac)         flags="$flags --iac" ;;
              mcp)         flags="$flags --mcp" ;;
              completions) flags="$flags --completions" ;;
              schemas)     flags="$flags --schemas" ;;
              docs)        flags="$flags --docs" ;;
              *)           echo "::warning::unknown forge-gen output: $p (skipped)" ;;
            esac
          done
          # forge-gen lives at github:pleme-io/forge-gen#default
          # shellcheck disable=SC2086
          nix run github:pleme-io/forge-gen -- --spec "$SPEC" $flags

      - name: Detect drift + open PR
        if: ${{ inputs.commitOnDrift }}
        env:
          PREFIX: ${{ inputs.branchPrefix }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "::notice::forge-gen output matches HEAD — no PR needed"
            exit 0
          fi
          ts=$(date -u +%Y%m%d%H%M%S)
          branch="${PREFIX}${ts}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add -A
          git commit -m "forge-gen: regenerate ${{ inputs.outputs }}"
          git push origin "$branch"
          gh pr create \
            --title "forge-gen: regenerate ${{ inputs.outputs }}" \
            --body "Auto-regenerated by substrate's caixa-forge.yml against \`${{ inputs.spec }}\`. Review the diff for unexpected changes before merging." \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$branch"
