name: publish-flakehub

# FLAGGED OFF 2026-07-18 — FlakeHub publishing disabled. This failed on every
# push: (1) the sparse-checkout below grabs only flake.nix + flake.lock, so
# `nix flake show` can't resolve the lib/ tree the flake references ("path does
# not exist"), and (2) a FlakeHub 401 ("User is not authorized for this
# resource"). Manual-only for now; re-enable the `push` trigger + fix the
# sparse-checkout + auth to restore.
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            flake.nix
            flake.lock
          sparse-checkout-cone-mode: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          github-token: ${{ secrets.BOT_PAT }}

      - name: Publish to FlakeHub
        uses: DeterminateSystems/flakehub-push@main
        with:
          visibility: public
          rolling: true