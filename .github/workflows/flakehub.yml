name: publish-flakehub

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish to FlakeHub
        uses: DeterminateSystems/flakehub-push@main
        with:
          directory: .
          visibility: public
          token: ${{ secrets.FLAKEHUB_TOKEN }}