name: publish-flakehub

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            nix
            flake.nix
            flake.lock
          sparse-checkout-cone-mode: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Get FlakeHub token via SOPS
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          echo "$SOPS_AGE_KEY" > /tmp/agekey.txt
          nix run github:getsops/sops -- \
            --age-key-file=/tmp/agekey.txt -d nix/secrets.yaml > /tmp/secrets.yaml
          python3 -c "
import yaml
with open('/tmp/secrets.yaml') as f:
    s = yaml.safe_load(f)
t = s.get('flakehub',{}).get('token','')
print('FLAKEHUB_TOKEN=' + t)
" >> $GITHUB_ENV

      - name: Publish to FlakeHub
        uses: DeterminateSystems/flakehub-push@main
        with:
          directory: .
          visibility: public
          token: ${{ env.FLAKEHUB_TOKEN }}