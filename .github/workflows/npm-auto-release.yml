name: npm-auto-release

# Reusable workflow: on push to main, bump an npm package's
# version, commit, tag, push, publish to npmjs.org.
#
# Consumer (.github/workflows/auto-release.yml):
#   on: { push: { branches: [main] } }
#   jobs:
#     release:
#       uses: pleme-io/substrate/.github/workflows/npm-auto-release.yml@main
#       secrets: inherit

on:
  workflow_call:
    inputs:
      bump-type:
        type: string
        required: false
        default: patch
      access:
        type: string
        required: false
        default: public
      source-paths:
        type: string
        required: false
        default: "src package.json package-lock.json"
      add-paths:
        type: string
        required: false
        default: "package.json package-lock.json"
      # Runner routing: empty default routes by CALLER repo visibility —
      # private repos → the org-scoped camelot-builder-pleme ARC pool (avoids billed
      # hosted minutes; org runner groups refuse public repos anyway), public
      # repos → ubuntu-latest. Schedule-triggered callers may lack
      # github.event.repository and fall open to hosted (documented edge).
      # Do NOT put an expression in this default — workflow_call input
      # defaults are static; the fallback lives in each job's runs-on.
      runner:
        description: "Explicit runner label override; empty = route by caller repo visibility (private → camelot-builder-pleme, public → ubuntu-latest)."
        type: string
        required: false
        default: ""
    secrets:
      NPM_TOKEN:
        required: true
      BOT_PAT:
        required: false

permissions:
  contents: write

jobs:
  bump:
    runs-on: ${{ inputs.runner != '' && inputs.runner || (github.event.repository.private && 'camelot-builder-pleme' || 'ubuntu-latest') }}
    if: github.actor != 'github-actions[bot]'
    outputs:
      bumped: ${{ steps.bump.outputs.bumped }}
      new-version: ${{ steps.bump.outputs.new-version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}

      - id: bump
        uses: pleme-io/actions/npm-bump@main
        with:
          bump-type: ${{ inputs.bump-type }}
          source-paths: ${{ inputs.source-paths }}

      - if: steps.bump.outputs.bumped == 'true'
        uses: pleme-io/actions/git-commit-tag@main
        with:
          version: ${{ steps.bump.outputs.new-version }}
          add-paths: ${{ inputs.add-paths }}

      - if: steps.bump.outputs.bumped == 'true'
        uses: pleme-io/actions/git-push-with-token@main
        with:
          token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          branch: main
          push-tags: "true"

  ship:
    needs: bump
    runs-on: ${{ inputs.runner != '' && inputs.runner || (github.event.repository.private && 'camelot-builder-pleme' || 'ubuntu-latest') }}
    if: needs.bump.outputs.bumped == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}

      - uses: pleme-io/actions/npm-publish@main
        with:
          access: ${{ inputs.access }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
