# Reusable workflow: build a Docker/OCI image with Nix and push to a registry.
#
# Usage (from a consumer repo):
#
#   jobs:
#     image:
#       uses: pleme-io/substrate/.github/workflows/image-push.yml@main
#       with:
#         imageAttr: dockerImage         # default: "dockerImage"
#         tag: ${{ github.ref_name }}    # default: "latest"
#         registry: ghcr.io              # default: "ghcr.io"
#         imageName: ${{ github.repository }}  # default: ${{ github.repository }}
#       secrets:
#         GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}  # falls back to GITHUB_TOKEN
#
# Strategy:
#   1. nix build .#<imageAttr>     -> produces a Docker image tarball at ./result
#   2. forge push ... (if forge is on PATH or buildable from .#forge)
#      otherwise falls back to skopeo copy docker-archive: -> docker://
#
# The flake must expose `packages.<system>.<imageAttr>` producing a Docker
# image tarball (e.g. via pkgs.dockerTools.buildLayeredImage).
#
# ★ AUTOBUMP convention (org directive: pleme-io/CLAUDE.md ★★ AUTO-RELEASE →
# "★ AUTOBUMP — exact-pin continuous delivery; never :latest"). On a merge to
# main, pass a SORTABLE EXACT tag so subscribing environments auto-track the
# newest build via Flux image-automation AND always know exactly what is running:
#
#     tag: <arch>-r${{ github.run_number }}-${{ github.sha }}
#     # e.g.  amd64-r142-9c1f0ab   (r<n> is the numeric sort key; sha = trace)
#
# Build on a NATIVE-arch runner (`runner: rio-builder` for amd64) so the binary
# matches the target — an off-target build mislabels the arch and `exec format
# error`s at runtime. Use `additionalTags: <arch>-latest` ONLY as a human-facing
# moving pointer; the DEPLOY target is always the exact `r<n>` tag, which a
# cluster's committed `# {"$imagepolicy"}` marker pins. The `tag` default below
# is `latest` for back-compat only — autobump-native repos MUST override it.

name: image-push

on:
  workflow_call:
    inputs:
      imageAttr:
        description: "Flake output attribute that builds the image tarball"
        type: string
        default: "dockerImage"
      tag:
        description: "Image tag to push"
        type: string
        default: "latest"
      registry:
        description: "Target OCI registry"
        type: string
        default: "ghcr.io"
      imageName:
        description: "Image name (without registry / tag); default is the repo slug"
        type: string
        default: ""
      flakeRef:
        description: "Flake ref to build from"
        type: string
        default: "."
      additionalTags:
        description: "Space-separated extra tags to push alongside `tag` (e.g. 'latest v1')"
        type: string
        default: "latest"
      runner:
        description: "Runner label"
        type: string
        default: "ubuntu-24.04"
      buildCores:
        description: "nix --cores (per-derivation parallelism). Empty = nproc. Lower (e.g. 4) to cap peak RAM of heavy compiles (ruby/llvm) on memory-constrained self-hosted runners that OOM at nproc."
        type: string
        default: ""
      maxJobs:
        description: "nix --max-jobs (max concurrent derivations). Empty = nix default. Lower (e.g. 2) with a low buildCores to bound how many heavy builds stack at once on a small node."
        type: string
        default: ""
      extraSubstituters:
        description: "Extra Nix binary-cache URL(s) to pull from (space-separated). E.g. a self-hosted attic on the runner's node so heavy crates/gems SUBSTITUTE instead of compiling (the cure for cold-cache OOMs). Empty = no extra cache (zero blast radius for other consumers)."
        type: string
        default: ""
      extraTrustedPublicKeys:
        description: "Trusted public key(s) for extraSubstituters (space-separated, 'name:base64' form). Required when extraSubstituters is set, else Nix refuses the unsigned cache."
        type: string
        default: ""
      netrcFile:
        description: "Path to a netrc file (present on the runner) authenticating to extraSubstituters. For a token-gated attic cache, mount the read token as a netrc and point here. Empty = anonymous."
        type: string
        default: ""
    secrets:
      GHCR_TOKEN:
        description: "Token with write:packages on the target registry. Falls back to GITHUB_TOKEN."
        required: false

jobs:
  push:
    name: Build & push image
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          # pleme-io's default build pattern is IFD-self-derive: gen-based
          # crates (tatara-lisp and friends) generate their Cargo build spec
          # via an Import-From-Derivation marked `__noChroot`. The strict
          # default (`sandbox = true`) rejects `__noChroot` outright
          # ("has '__noChroot' set, but that's not allowed when 'sandbox' is
          # 'true'"), breaking every action-image build that bundles a tlisp
          # interpreter.
          #
          # Determinate Nix manages its own daemon config and ignores an
          # `extra-conf` sandbox override (and its FlakeHub cache 401s for
          # this org anyway, so it buys nothing here). Install upstream Nix
          # instead, where `extra-conf` is honored: `sandbox = relaxed`
          # keeps the sandbox for ordinary derivations and only un-sandboxes
          # those that explicitly opt in via `__noChroot`.
          determinate: false
          # The attic lines are injected into the DAEMON nix.conf at install
          # time (trusted), so extra-substituters + extra-trusted-public-keys are
          # honored regardless of trusted-user status. Empty inputs render blank
          # lines → zero effect for consumers that don't opt in. netrc-file
          # authenticates a token-gated cache (the file is mounted on the runner).
          extra-conf: |
            sandbox = relaxed
            ${{ inputs.extraSubstituters && format('extra-substituters = {0}', inputs.extraSubstituters) || '' }}
            ${{ inputs.extraTrustedPublicKeys && format('extra-trusted-public-keys = {0}', inputs.extraTrustedPublicKeys) || '' }}
            ${{ inputs.netrcFile && format('netrc-file = {0}', inputs.netrcFile) || '' }}

      # `nix build` writes ./result as a symlink into /nix/store/...
      # The oci-image-push Docker action doesn't have /nix/store mounted,
      # so the symlink dereferences to nothing inside the container.
      # Materialize the actual tarball into the workspace (a real file
      # under /github/workspace) before handing off.
      - name: Build image with Nix
        env:
          BUILD_CORES: ${{ inputs.buildCores }}
          MAX_JOBS: ${{ inputs.maxJobs }}
        run: |
          # Optional parallelism caps for memory-constrained runners: a high
          # nproc compile (e.g. ruby-3.4.9 from source) can spike peak RAM past a
          # small self-hosted node's free memory and get OOM-killed (signal 9).
          # --cores bounds per-derivation parallelism; --max-jobs bounds concurrent
          # derivations. Empty inputs leave nix at its defaults (zero blast radius
          # for beefy runners).
          FLAGS=""
          if [ -n "$BUILD_CORES" ]; then FLAGS="$FLAGS --cores $BUILD_CORES"; fi
          if [ -n "$MAX_JOBS" ]; then FLAGS="$FLAGS --max-jobs $MAX_JOBS"; fi
          echo "nix build parallelism flags:${FLAGS:- (defaults)}"
          nix build "${{ inputs.flakeRef }}#${{ inputs.imageAttr }}" --print-out-paths $FLAGS
          cp -L result image.tar.gz

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN || github.token }}

      # Direct host-nix skopeo push. Originally went through
      # pleme-io/actions/oci-image-push@v1, but that's itself a Docker
      # action whose base image (tatara-script) is published by THIS
      # workflow — a bootstrap cycle. Host-nix skopeo breaks the
      # cycle and stays a single-purpose, self-contained step.
      - name: Push image (host nix skopeo)
        env:
          REGISTRY: ${{ inputs.registry }}
          IMAGE:    ${{ inputs.imageName || github.repository }}
          TAG:      ${{ inputs.tag }}
          ADDITIONAL_TAGS: ${{ inputs.additionalTags }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN || github.token }}
        run: |
          set -euo pipefail
          # The ubuntu runner ships a v1 /etc/containers/registries.conf,
          # which nixpkgs skopeo rejects ("registries.conf must be in v2
          # format but is in v1"). Point skopeo at a minimal v2 config —
          # we only ever push fully-qualified docker:// refs, so no
          # unqualified search registries are needed.
          export CONTAINERS_REGISTRIES_CONF="${RUNNER_TEMP:-/tmp}/registries.conf"
          printf 'unqualified-search-registries = []\n' > "$CONTAINERS_REGISTRIES_CONF"
          # Push primary tag, then each additionalTag, all as copies
          # of the same content-addressed image (skopeo copy is cheap
          # — server-side mount when blobs already exist).
          push_one() {
            local t="$1"
            local target="${REGISTRY}/${IMAGE}:${t}"
            nix shell nixpkgs#skopeo --command \
              skopeo --insecure-policy copy \
                --dest-creds "${{ github.actor }}:${GHCR_TOKEN}" \
                "docker-archive:./image.tar.gz" \
                "docker://${target}"
          }
          push_one "$TAG"
          # shellcheck disable=SC2086 — splitting on whitespace is intended
          for extra in $ADDITIONAL_TAGS; do
            push_one "$extra"
          done
