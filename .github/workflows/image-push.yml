# Reusable workflow: build a Docker/OCI image with Nix and push to a registry.
#
# Usage (from a consumer repo):
#
#   jobs:
#     image:
#       uses: pleme-io/substrate/.github/workflows/image-push.yml@main
#       with:
#         imageAttr: dockerImage         # default: "dockerImage"
#         tag: ${{ github.ref_name }}    # default: "latest"
#         registry: ghcr.io              # default: "ghcr.io"
#         imageName: ${{ github.repository }}  # default: ${{ github.repository }}
#       secrets:
#         GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}  # falls back to GITHUB_TOKEN
#
# Strategy:
#   1. nix build .#<imageAttr>     -> produces a Docker image tarball at ./result
#   2. forge push ... (if forge is on PATH or buildable from .#forge)
#      otherwise falls back to skopeo copy docker-archive: -> docker://
#
# The flake must expose `packages.<system>.<imageAttr>` producing a Docker
# image tarball (e.g. via pkgs.dockerTools.buildLayeredImage).

name: image-push

on:
  workflow_call:
    inputs:
      imageAttr:
        description: "Flake output attribute that builds the image tarball"
        type: string
        default: "dockerImage"
      tag:
        description: "Image tag to push"
        type: string
        default: "latest"
      registry:
        description: "Target OCI registry"
        type: string
        default: "ghcr.io"
      imageName:
        description: "Image name (without registry / tag); default is the repo slug"
        type: string
        default: ""
      flakeRef:
        description: "Flake ref to build from"
        type: string
        default: "."
      additionalTags:
        description: "Space-separated extra tags to push alongside `tag` (e.g. 'latest v1')"
        type: string
        default: "latest"
      runner:
        description: "Runner label"
        type: string
        default: "ubuntu-24.04"
    secrets:
      GHCR_TOKEN:
        description: "Token with write:packages on the target registry. Falls back to GITHUB_TOKEN."
        required: false

jobs:
  push:
    name: Build & push image
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          # pleme-io's default build pattern is IFD-self-derive: gen-based
          # crates (tatara-lisp and friends) generate their Cargo build spec
          # via an Import-From-Derivation marked `__noChroot`. The strict
          # default (`sandbox = true`) rejects `__noChroot` outright
          # ("has '__noChroot' set, but that's not allowed when 'sandbox' is
          # 'true'"), breaking every action-image build that bundles a tlisp
          # interpreter.
          #
          # Determinate Nix manages its own daemon config and ignores an
          # `extra-conf` sandbox override (and its FlakeHub cache 401s for
          # this org anyway, so it buys nothing here). Install upstream Nix
          # instead, where `extra-conf` is honored: `sandbox = relaxed`
          # keeps the sandbox for ordinary derivations and only un-sandboxes
          # those that explicitly opt in via `__noChroot`.
          determinate: false
          extra-conf: |
            sandbox = relaxed

      # `nix build` writes ./result as a symlink into /nix/store/...
      # The oci-image-push Docker action doesn't have /nix/store mounted,
      # so the symlink dereferences to nothing inside the container.
      # Materialize the actual tarball into the workspace (a real file
      # under /github/workspace) before handing off.
      - name: Build image with Nix
        run: |
          nix build "${{ inputs.flakeRef }}#${{ inputs.imageAttr }}" --print-out-paths
          cp -L result image.tar.gz

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN || github.token }}

      # Direct host-nix skopeo push. Originally went through
      # pleme-io/actions/oci-image-push@v1, but that's itself a Docker
      # action whose base image (tatara-script) is published by THIS
      # workflow — a bootstrap cycle. Host-nix skopeo breaks the
      # cycle and stays a single-purpose, self-contained step.
      - name: Push image (host nix skopeo)
        env:
          REGISTRY: ${{ inputs.registry }}
          IMAGE:    ${{ inputs.imageName || github.repository }}
          TAG:      ${{ inputs.tag }}
          ADDITIONAL_TAGS: ${{ inputs.additionalTags }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN || github.token }}
        run: |
          set -euo pipefail
          # Push primary tag, then each additionalTag, all as copies
          # of the same content-addressed image (skopeo copy is cheap
          # — server-side mount when blobs already exist).
          push_one() {
            local t="$1"
            local target="${REGISTRY}/${IMAGE}:${t}"
            nix shell nixpkgs#skopeo --command \
              skopeo --insecure-policy copy \
                --dest-creds "${{ github.actor }}:${GHCR_TOKEN}" \
                "docker-archive:./image.tar.gz" \
                "docker://${target}"
          }
          push_one "$TAG"
          # shellcheck disable=SC2086 — splitting on whitespace is intended
          for extra in $ADDITIONAL_TAGS; do
            push_one "$extra"
          done
