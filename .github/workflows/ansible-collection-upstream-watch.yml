# Ansible collection upstream-watch -- reusable composite workflow (Layer 2).
#
# Composes:
#   - pleme-io/actions/spec-watch@v1
#   - pleme-io/actions/iac-forge@v1
#   - peter-evans/create-pull-request@v7
#
# Consumer (.github/workflows/upstream-watch.yml):
#   on: { schedule: [{ cron: '17 */4 * * *' }], workflow_dispatch: {} }
#   jobs:
#     watch:
#       uses: pleme-io/substrate/.github/workflows/ansible-collection-upstream-watch.yml@main
#       with:
#         upstream-spec-url: https://raw.githubusercontent.com/akeylesslabs/akeyless-go/master/api/openapi.yaml
#         spec-resources-repo: pleme-io/akeyless-terraform-resources
#
# Polls the upstream OpenAPI spec; when the sha changes, clones the
# terraform-resources sibling repo, regenerates the collection with iac-forge,
# and opens (or updates) the `upstream-spec-update` PR labeled `automated` so
# the auto-merge workflow can squash it once checks pass.

name: Ansible collection upstream-watch

on:
  workflow_call:
    inputs:
      upstream-spec-url:
        type: string
        required: true
      spec-resources-repo:
        type: string
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: spec
        uses: pleme-io/actions/spec-watch@v1
        with:
          upstream-url: ${{ inputs.upstream-spec-url }}

      - if: steps.spec.outputs.changed == 'true'
        shell: bash
        run: |
          git clone --depth=1 https://github.com/${{ inputs.spec-resources-repo }}.git ../specs
          mkdir -p .ci
          echo "${{ steps.spec.outputs.new-sha }}" > .ci/openapi-sha

      - if: steps.spec.outputs.changed == 'true'
        uses: pleme-io/actions/iac-forge@v1
        with:
          backend: ansible
          spec: .ci/openapi.yaml
          resources: ../specs/resources
          provider: ../specs/provider.toml
          data-sources: ../specs/data_sources
          output: .

      - if: steps.spec.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: upstream-spec-update
          commit-message: "chore(regen): upstream OpenAPI spec changed (${{ steps.spec.outputs.new-sha }})"
          title: "chore(regen): upstream OpenAPI spec update"
          body: "Auto-generated by substrate ansible-collection-upstream-watch."
          labels: automated, upstream-spec
          delete-branch: true
