# Reusable workflow to publish Nix flakes to FlakeHub
# Usage:
#   jobs:
#     flakehub:
#       uses: pleme-io/substrate/.github/workflows/reusable-flakehub.yml@main
#       with:
#         visibility: public  # or unlisted
#         rolling: true      # branch-based versioning

name: Reusable FlakeHub Publish

on:
  workflow_call:
    inputs:
      visibility:
        description: "Flake visibility (public or unlisted)"
        required: false
        type: string
        default: public
      rolling:
        description: "Use rolling versioning (for branch-based releases)"
        required: false
        type: boolean
        default: true
      directory:
        description: "Flake directory (relative to repo root)"
        required: false
        type: string
        default: .
      # Runner routing: empty default routes by CALLER repo visibility —
      # private repos → the pleme-io-org camelot-builder-pleme-eks ARC pool
      # (avoids billed hosted minutes), public repos → ubuntu-latest. Keyed
      # off github.event.repository.private (the caller's event payload),
      # never an org-level Actions variable — pleme-io's GitHub Free org
      # plan doesn't share org vars/secrets into private repos' workflow
      # context. Same idiom as rust-auto-release.yml/python-auto-release.yml.
      runner:
        required: false
        type: string
        default: ""
    # No secrets stanza — publish uses OIDC. An empty `secrets:` with only
    # a comment parses as `secrets: null` and breaks workflow-file
    # validation for callers.

jobs:
  publish:
    # FLAGGED OFF 2026-07-18 — FlakeHub publishing disabled fleet-wide. Every
    # caller of this reusable (irodori/ishou/tatara-lisp/zuihitsu/…) now no-ops
    # (skipped → green) instead of failing on the FlakeHub 401 ("User is not
    # authorized for this resource") + the `nix flake show` eval errors. Re-enable
    # by removing this `if:` line once FlakeHub auth is sorted.
    if: false
    runs-on: ${{ inputs.runner != '' && inputs.runner || (github.event.repository.private && 'camelot-builder-pleme-eks' || 'ubuntu-latest') }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          github-token: ${{ secrets.BOT_PAT }}

      - name: Publish to FlakeHub
        # Pin to v6 (latest tagged release, 2025-07-15) — @main
        # started enumerating devShell stdenv-internal attrs
        # (__darwinAllowLocalNetworking, __structuredAttrs, …) and
        # erroring on missing `.name`. v6 is the last known-good.
        uses: DeterminateSystems/flakehub-push@v6
        with:
          visibility: ${{ inputs.visibility }}
          rolling: ${{ inputs.rolling }}
          directory: ${{ inputs.directory }}