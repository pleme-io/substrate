# Reusable workflow: cross-arch Rust binary release.
#
#   build (matrix: linux/macOS × x86_64/aarch64)
#     -> attach binaries + .sha256 to GitHub Release on `v*` tag push
#
# Sibling of rust-release.yml; this one is feature-aware and binary-only
# (no crates.io publish). Use it when a CLI ships with optional cargo
# features and consumers need to select which to compile in.
#
# Usage (from a consumer repo, .github/workflows/release-binaries.yml):
#
#   on:
#     push:
#       tags: ['v*']
#
#   jobs:
#     binaries:
#       uses: pleme-io/substrate/.github/workflows/rust-binary-release.yml@main
#       with:
#         binary-name: my-tool
#         features: "feat-a feat-b"     # optional
#         no-default-features: true     # optional
#         system-deps: "libxkbcommon-dev libwayland-dev"  # optional (ubuntu legs)
#
# GPU / windowing apps (winit/wgpu): pass `system-deps` the apt
# packages the linux build needs (e.g. libxkbcommon-dev libwayland-dev
# libwayland-cursor0 pkg-config). They are apt-get installed on the
# ubuntu matrix legs BEFORE the build. macOS legs are untouched —
# Metal ships in the SDK. This is the compounding extension every
# GPU app reuses.

name: Rust binary release

on:
  workflow_call:
    inputs:
      binary-name:
        type: string
        required: true
        description: "Name of the Cargo binary (used for `target/<triple>/release/<binary-name>`)"
      features:
        type: string
        default: ""
        description: "Cargo features (space-separated). Empty = no --features flag."
      no-default-features:
        type: boolean
        default: false
        description: "When true, pass --no-default-features to cargo build"
      system-deps:
        type: string
        default: ""
        description: "Space-separated apt packages installed on the ubuntu matrix legs before the build (GPU/windowing libs, e.g. libxkbcommon-dev libwayland-dev). Empty = no apt install. macOS legs unaffected."

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, suffix: linux-x86_64 }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu, suffix: linux-aarch64 }
          - { os: macos-latest, target: x86_64-apple-darwin, suffix: macos-x86_64 }
          - { os: macos-latest, target: aarch64-apple-darwin, suffix: macos-aarch64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compiler (linux aarch64 only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure cross-linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      # GPU / windowing system libs (winit/wgpu). Only on the ubuntu
      # legs and only when system-deps is non-empty. macOS uses the
      # Metal SDK and needs nothing here.
      - name: Install system deps (ubuntu only)
        if: runner.os == 'Linux' && inputs.system-deps != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ inputs.system-deps }}

      - name: Build + stage
        uses: pleme-io/actions/rust-cross-build@v1
        with:
          binary-name:         ${{ inputs.binary-name }}
          target:              ${{ matrix.target }}
          suffix:              ${{ matrix.suffix }}
          features:            ${{ inputs.features }}
          no-default-features: ${{ inputs.no-default-features }}

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ inputs.binary-name }}-${{ matrix.suffix }}
            dist/${{ inputs.binary-name }}-${{ matrix.suffix }}.sha256
