name: nix-tests

# Eval-time tests for substrate's typed Nix functions. Each test
# expression evaluates to `{ total = N; passed = N; }` on success or
# throws on the first failure — `nix-instantiate --eval --strict`
# returns non-zero on throw, so the step fails closed.
#
# Add a new entry here for each `tests/*-test.nix` you ship under
# `lib/build/<area>/tests/`. The pattern is uniform: one Nix
# expression, exit non-zero on throw, gate on it.

on:
  push:
    branches:
      - main
    paths:
      - 'lib/build/estante/**'
      - 'lib/build/rust/**'
      - 'lib/build/go/**'
      - '.github/workflows/nix-tests.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'lib/build/estante/**'
      - 'lib/build/rust/**'
      - 'lib/build/go/**'
      - '.github/workflows/nix-tests.yml'
  workflow_dispatch:

jobs:
  estante-loaders:
    name: estante — loader + verifier eval tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          github-token: ${{ secrets.BOT_PAT }}

      - name: lockfile-loader-test.nix
        run: nix-instantiate --eval --strict lib/build/estante/tests/lockfile-loader-test.nix

      - name: receipt-loader-test.nix
        run: nix-instantiate --eval --strict lib/build/estante/tests/receipt-loader-test.nix

      - name: mk-receipt-verifier-test.nix
        run: nix-instantiate --eval --strict lib/build/estante/tests/mk-receipt-verifier-test.nix

  rust-overrides:
    name: rust — crate-override + quirk-apply eval tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          github-token: ${{ secrets.BOT_PAT }}

      - name: crate-override-compose-test.nix
        run: nix-instantiate --eval --strict lib/build/rust/crate-override-compose-test.nix

      - name: quirk-apply-test.nix
        run: nix-instantiate --eval --strict lib/build/rust/quirk-apply-test.nix

      - name: darwin-test.nix (mkDarwinBuildInputs private-frameworks hook)
        run: nix-instantiate --eval --strict lib/util/darwin-test.nix

  go-package-graph:
    name: go — gen-gomod M1 per-package interpreter eval tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          github-token: ${{ secrets.BOT_PAT }}

      - name: package-graph-test.nix
        run: nix-instantiate --eval --strict lib/build/go/tests/package-graph-test.nix
