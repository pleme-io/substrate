# Ansible collection auto-bump -- reusable composite workflow (Layer 2).
#
# Composes:
#   - pleme-io/actions/substrate-bump@v1
#
# Consumer (.github/workflows/auto-bump.yml):
#   on: { push: { branches: [main] } }
#   jobs:
#     bump:
#       uses: pleme-io/substrate/.github/workflows/ansible-collection-auto-bump.yml@main
#       secrets:
#         # Optional: pass a PAT so the tag push triggers downstream
#         # workflows. The default GITHUB_TOKEN cannot trigger another
#         # workflow run on its own pushes (GH security restriction).
#         BOT_PAT: ${{ secrets.BOT_PAT }}
#
# Skips when the bot itself pushed, or when nothing under plugins/, meta/, or
# galaxy.yml changed since the previous tag. Otherwise: patch-bump (or whatever
# `bump-type` says), commit, push, tag, push tag.
#
# BOT_PAT semantics (https://docs.github.com/en/actions/security-guides/automatic-token-authentication#using-the-github_token-in-a-workflow):
#   - If the consumer provides BOT_PAT, checkout + push both use it, which
#     lets the tag push trigger the release workflow.
#   - If BOT_PAT is absent we fall back to GITHUB_TOKEN; the bump still
#     succeeds and the tag still lands, but the release workflow must be
#     triggered manually (`gh workflow run release.yml --ref vX.Y.Z`).

name: Ansible collection auto-bump

on:
  workflow_call:
    inputs:
      bump-type:
        type: string
        default: patch
    secrets:
      BOT_PAT:
        required: false
        description: "Optional PAT for tag pushes to trigger downstream workflows. Falls back to GITHUB_TOKEN if absent."

permissions:
  contents: write
  # actions: write lets the post-bump step `gh workflow run release.yml
  # --ref vX.Y.Z` succeed under the default GITHUB_TOKEN so consumers
  # don't need a PAT to get the end-to-end Galaxy publish loop.
  actions: write

jobs:
  bump:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}

      - id: changes
        shell: bash
        run: |
          last=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$last" ]; then echo "skip=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          if git diff --quiet "$last" HEAD -- plugins/ meta/ galaxy.yml; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.changes.outputs.skip == 'false'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - id: bump
        if: steps.changes.outputs.skip == 'false'
        uses: pleme-io/actions/substrate-bump@v1
        with:
          bump-type: ${{ inputs.bump-type }}

      - if: steps.changes.outputs.skip == 'false'
        uses: pleme-io/actions/git-push-with-token@v1
        with:
          token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          branch: main
          push-tags: "true"

      # The default GITHUB_TOKEN cannot trigger downstream workflows via
      # plain tag pushes (GH security restriction), but `gh workflow run`
      # IS allowed under the same token with `actions: write`. So we
      # explicitly dispatch the release workflow on the freshly-cut tag.
      # When BOT_PAT is configured, the tag push above would have already
      # triggered the release workflow; calling dispatch a second time
      # would create a duplicate, so skip in that case.
      - if: steps.changes.outputs.skip == 'false' && env.HAS_BOT_PAT != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HAS_BOT_PAT: ${{ secrets.BOT_PAT != '' && 'true' || 'false' }}
        shell: bash
        run: |
          new_tag=$(git describe --tags --abbrev=0)
          if [ -z "$new_tag" ]; then
            echo "[auto-bump] no tag found; skipping release dispatch" >&2
            exit 0
          fi
          if [ -f .github/workflows/release.yml ]; then
            echo "[auto-bump] dispatching release.yml for $new_tag"
            gh workflow run release.yml --ref "$new_tag"
          else
            echo "[auto-bump] no .github/workflows/release.yml found; skipping dispatch"
          fi
