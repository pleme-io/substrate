name: auto-bump

# Self-bump for the pleme-io/substrate repo. Substrate hosts the
# canonical reusable workflows that the fleet's auto-release.yml
# consumers reference. Tagging each push gives consumers a way
# to pin a substrate revision when they want stability over
# 'always-latest @main'.
#
# Mirrors pleme-io/actions/.github/workflows/auto-bump.yml — same
# pattern, different repo.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump-type:
        description: "patch | minor | major"
        required: false
        default: patch

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}

      - name: Skip when no workflow / lib changes since last tag
        id: changes
        shell: bash
        run: |
          last=$(git tag -l 'v0.*' --sort=-v:refname | head -1 || true)
          if [ -z "$last" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "no prior tag — bump"
            exit 0
          fi
          if git diff --quiet "$last" HEAD -- '.github/workflows/' 'lib/' 'docs/'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
          echo "last=$last" >> "$GITHUB_OUTPUT"

      - name: Compute next tag
        if: steps.changes.outputs.skip == 'false'
        id: next
        shell: bash
        run: |
          last="${{ steps.changes.outputs.last }}"
          if [ -z "$last" ]; then
            echo "tag=v0.1.0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          bump="${{ inputs.bump-type || 'patch' }}"
          IFS='.' read -r maj min pat <<<"${last#v}"
          case "$bump" in
            major) maj=$((maj+1)); min=0; pat=0 ;;
            minor) min=$((min+1)); pat=0 ;;
            patch|*) pat=$((pat+1)) ;;
          esac
          echo "tag=v${maj}.${min}.${pat}" >> "$GITHUB_OUTPUT"

      - name: Create + push tag
        if: steps.changes.outputs.skip == 'false'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          tag="${{ steps.next.outputs.tag }}"
          git tag -a "$tag" -m "release: pleme-io/substrate $tag"
          git push origin "$tag"
          echo "tagged + pushed $tag"
