name: Publish to crates.io

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
    secrets:
      SOPS_AGE_KEY:
        required: true
      CRATES_API_TOKEN:
        required: false

jobs:
  publish:
    name: Publish ${{ inputs.package }} to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            secrets.yaml
            .sops.yaml
          sparse-checkout-cone-mode: false

      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs#sops nixpkgs#yq

      - name: Decrypt secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          sops decrypt secrets.yaml > decrypted.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        env:
          CRATES_API_TOKEN: ${{ secrets.CRATES_API_TOKEN }}
        run: |
          if [ -n "$CRATES_API_TOKEN" ]; then
            cargo publish -p ${{ inputs.package }}
          else
            TOKEN=$(yq '.crates["publish-token"]' decrypted.yaml)
            CARGO_REGISTRY_TOKEN="$TOKEN" cargo publish -p ${{ inputs.package }}
          fi