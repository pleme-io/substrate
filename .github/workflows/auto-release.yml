name: auto-release

# Polymorphic auto-release. Detects the repo type at the start
# (via pleme-io/actions/detect-repo-type) + dispatches to the
# appropriate per-type pipeline (bump + commit + tag + push +
# publish). Every pleme-io repo regardless of language uses the
# same 3-line consumer shim:
#
#   on: { push: { branches: [main] } }
#   jobs:
#     release:
#       uses: pleme-io/substrate/.github/workflows/auto-release.yml@main
#       secrets: inherit
#
# The repo type is inferred from manifest presence:
#   Cargo.toml + [workspace]  → rust-workspace
#   Cargo.toml + [package]    → rust-single-crate
#   go.mod                    → go (pull-model module, FSM-MODULE)
#   pyproject.toml            → python
#   package.json              → npm
#   Chart.yaml                → helm
#
# Each per-type job is gated by the detect output; only one
# branch runs per invocation.
#
# secrets: inherit at every layer — propagates whatever the
# operator's repo has access to without having to enumerate per-
# language-specific tokens here.

on:
  workflow_call:
    inputs:
      bump-type:
        type: string
        required: false
        default: patch
      # Runner routing: empty default routes by CALLER repo visibility —
      # private repos → the org-scoped rio-private ARC pool (avoids billed
      # hosted minutes; org runner groups refuse public repos anyway), public
      # repos → ubuntu-latest. Schedule-triggered callers may lack
      # github.event.repository and fall open to hosted (documented edge).
      # Passed through verbatim to every per-language reusable below.
      runner:
        description: "Explicit runner label override; empty = route by caller repo visibility (private → rio-private, public → ubuntu-latest)."
        type: string
        required: false
        default: ""
    # No `secrets:` block — `secrets: inherit` from the consumer
    # passes everything down; inner `uses:` calls also use `inherit`.

permissions:
  contents: write

# Serialize releases per repository — two pushes to main otherwise race two
# bump runs from the same base and the second push is rejected non-ff (its
# bump lost). Queue rather than cancel; an in-flight release must finish.
# This is the canonical entrypoint (the 3-line consumer shim), so its
# concurrency is the one GitHub honors for repos using the polymorphic flow.
concurrency:
  group: auto-release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  detect:
    name: Detect repo type
    runs-on: ${{ inputs.runner != '' && inputs.runner || (github.event.repository.private && 'rio-private' || 'ubuntu-latest') }}
    outputs:
      repo-type: ${{ steps.detect.outputs.repo-type }}
      manifest-path: ${{ steps.detect.outputs.manifest-path }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        uses: pleme-io/actions/detect-repo-type@main

  rust-workspace:
    name: 'rust-workspace · release'
    needs: detect
    if: needs.detect.outputs.repo-type == 'rust-workspace'
    uses: pleme-io/substrate/.github/workflows/rust-auto-release.yml@main
    with:
      bump-type: ${{ inputs.bump-type }}
      runner: ${{ inputs.runner }}
    secrets: inherit

  rust-single-crate:
    name: 'rust-single-crate · release'
    needs: detect
    if: needs.detect.outputs.repo-type == 'rust-single-crate'
    uses: pleme-io/substrate/.github/workflows/cargo-auto-release.yml@main
    with:
      bump-type: ${{ inputs.bump-type }}
      runner: ${{ inputs.runner }}
    secrets: inherit

  go:
    name: 'go · release'
    needs: detect
    if: needs.detect.outputs.repo-type == 'go'
    # FSM-MODULE: pull-model, tag-only — go-auto-release.yml's only publish
    # side effect is the tag push; proxy.golang.org indexes lazily.
    uses: pleme-io/substrate/.github/workflows/go-auto-release.yml@main
    with:
      bump-type: ${{ inputs.bump-type }}
      runner: ${{ inputs.runner }}
    secrets: inherit

  npm:
    name: 'npm · release'
    needs: detect
    if: needs.detect.outputs.repo-type == 'npm'
    uses: pleme-io/substrate/.github/workflows/npm-auto-release.yml@main
    with:
      bump-type: ${{ inputs.bump-type }}
      runner: ${{ inputs.runner }}
    secrets: inherit

  python:
    name: 'python · release'
    needs: detect
    if: needs.detect.outputs.repo-type == 'python'
    uses: pleme-io/substrate/.github/workflows/python-auto-release.yml@main
    with:
      bump-type: ${{ inputs.bump-type }}
      runner: ${{ inputs.runner }}
    secrets: inherit

  helm:
    name: 'helm · release'
    needs: detect
    if: needs.detect.outputs.repo-type == 'helm'
    uses: pleme-io/substrate/.github/workflows/helm-auto-release.yml@main
    with:
      bump-type: ${{ inputs.bump-type }}
      runner: ${{ inputs.runner }}
    secrets: inherit

  unsupported:
    name: 'unsupported repo type'
    needs: detect
    if: needs.detect.outputs.repo-type == 'unknown'
    runs-on: ${{ inputs.runner != '' && inputs.runner || (github.event.repository.private && 'rio-private' || 'ubuntu-latest') }}
    steps:
      - name: Fail with diagnostic
        run: |
          echo "::error::detect-repo-type returned 'unknown' — no manifest at root recognized"
          echo "::error::see pleme-io/actions/detect-repo-type for the supported manifest list"
          exit 1
